async function loadAll(){

    const[{data:deals},{data:usuarios},{data:horas},{data:comts},{data:hist},{data:rec},{data:tarefas}]=await Promise.all([
      sb.from('deals').select('*').order('created_at',{ascending:false}),

      sb.from('horas').select('*').order('created_at',{ascending:false}),
      sb.from('comentarios').select('*').order('created_at',{ascending:true}),
      sb.from('historico').select('*').order('created_at',{ascending:false}),
      sb.from('receita_realizada').select('*').order('data_pagamento',{ascending:false}),
      sb.from('tarefas').select('*').order('prazo',{ascending:true}),
    ]);
    S.deals=deals||[];S.usuarios=usuarios||[];S.horas=horas||[];

async function saveDeal(d){
  const isN=!d.id||d.id.startsWith('new_');
  if(isN){const t={...d};delete t.id;const{data:nd}=await sb.from('deals').insert(t).select().single();if(nd){S.deals.unshift(nd);await addH(nd.id,'Criação','—','Projeto criado');}}
  else{const old=S.deals.find(x=>x.id===d.id);await sb.from('deals').update({...d,updated_at:new Date()}).eq('id',d.id);const i=S.deals.findIndex(x=>x.id===d.id);if(i>=0){const flds=['cliente','status','prob','mandato','deal_value','success_fee','retainer_f2','diretor','gerente','analista','resultado'];for(const f of flds){if(old&&String(old[f])!==String(d[f]))await addH(d.id,f,old[f],d[f]);}S.deals[i]={...S.deals[i],...d};}}

// ═══ SHEETS ═══
async function importSheets(){
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=Contratos`);
    const csv=await res.text();const rows=parseCSV(csv);if(rows.length<2)return;
    const ex=new Set(S.deals.map(d=>d.arquivo).filter(Boolean));const toI=[];
    rows.slice(1).forEach(row=>{
      const g=i=>i<row.length?String(row[i]||'').trim():'';
      const arq=g(0);if(!arq||ex.has(arq))return;
      const st=g(29)||'Ativo';if(st==='ERRO NA EXTRACAO')return;
      const ret=pN(g(13));
      toI.push({source:'sheets',arquivo:arq,data_extracao:g(1),cliente:g(2)||arq,cnpj:g(3),contato:g(4),email:g(5),projeto:g(6)||arq,mandato:g(7)||'outro',descricao:g(8),data_assinatura:g(9),data_inicio:g(10),retainer_f1:15000,retainer_f2:ret||7000,success_fee:pN(g(16)),success_fee_min:pN(g(17)),success_fee_base:g(18),deal_value:pN(g(19)),obs:g(23),diretor:g(24),gerente:g(25),analista:g(26),setor:g(27),status:st,status_fat:g(30)||'Pendente',tipo:'M&A',polo:'ES',prob:'Alta',etapas:{},fase_atual:0,parcelas:[]});
    });
    if(toI.length){const{data:ins}=await sb.from('deals').insert(toI).select();if(ins)S.deals=[...ins,...S.deals];}
  }catch(e){console.error(e);}
}
function parseCSV(t){const r=[];for(const l of t.split('\n')){if(!l.trim())continue;const row=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){row.push(c.trim());c='';}else c+=ch;}row.push(c.trim());r.push(row);}return r;}

// ═══ STEPPER SALESFORCE ═══
function sfStepper(d){
  const et=d.etapas||{};
  const feitas=Object.values(et).filter(v=>v==='done').length;
  const pct=Math.round(feitas/FASES.length*100);
  const f1=FASES.filter(f=>f.f===1);const f2=FASES.filter(f=>f.f===2);
  const renderFase=(fases,offset)=>fases.map((e,i)=>{
    const idx=offset+i;const done=et[idx]==='done';const isActive=!done&&idx===feitas;
    return`<div class="sf-step ${done?'done':isActive?'active':''}" onclick="hSetEtapa('${d.id}',${idx})" title="${done?'Clique para reabrir':'Clique para marcar como concluído'}">
      <div class="sf-circle">${done?'✓':idx+1}</div>
      <div class="sf-label">${e.n}</div>
    </div>`;}).join('');
  return`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:12px;font-weight:600;color:var(--text)">Progresso: <span style="color:var(--blue)">${pct}%</span> — ${feitas} de ${FASES.length} etapas concluídas</div>
  </div>
  <div style="height:6px;background:var(--bg3);border-radius:3px;margin-bottom:16px;overflow:hidden"><div style="height:6px;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:3px;width:${pct}%;transition:width .4s"></div></div>
  <div class="sf-fase-header">Fase 1 — Preparation & Marketing</div>
  <div class="sf-wrap"><div class="sf-track">${renderFase(f1,0)}</div></div>
  <div class="sf-fase-header" style="color:var(--cyan)">Fase 2 — Execution & Closing</div>
  <div class="sf-wrap"><div class="sf-track">${renderFase(f2,6)}</div></div>
  </div>`;
}

// ═══ PÁGINAS ═══
function filtrados(){let l=S.deals;if(S.filtroColab)l=l.filter(d=>d.diretor===S.filtroColab||d.gerente===S.filtroColab||d.analista===S.filtroColab);return l;}
function ativos(l){return(l||S.deals).filter(d=>d.status!=='Concluído'&&d.status!=='Congelado');}

function renderDash(){
  const all=filtrados();const at=ativos(all);
  const fl=S.seg==='ma'?at.filter(d=>d.tipo==='M&A'):S.seg==='dcm'?at.filter(d=>d.tipo==='DCM'):at;
  const tDV=fl.reduce((s,d)=>s+(d.deal_value||0),0);
  const tRet=fl.reduce((s,d)=>s+(d.retainer_f2||0),0);
  const tSF=fl.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  const rPond=fl.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100)*({Alta:.8,Média:.5,Baixa:.2}[d.prob]||.5),0);
  const tH=S.horas.reduce((s,h)=>s+(h.horas||0),0);
  const byM={};fl.forEach(d=>{byM[d.mandato]=(byM[d.mandato]||0)+(d.deal_value||0);});
  const bySt={};S.deals.forEach(d=>{bySt[d.status]=(bySt[d.status]||0)+1;});
  const byPolo={ES:0,SC:0,Ambos:0};fl.forEach(d=>{if(byPolo[d.polo]!==undefined)byPolo[d.polo]++;});
  // fases kanban
  const faseNomes=['Kickoff','Análise','Valuation','Materiais','Buyers','Go-to-mkt','IO/NBO','Negoc.','LOI','Due Dilig.','Contratos','Closing'];
  const byFase={};faseNomes.forEach((f,i)=>byFase[i]=[]);
  fl.forEach(d=>{const n=Object.values(d.etapas||{}).filter(v=>v==='done').length;const idx=Math.min(n,11);byFase[idx]=(byFase[idx]||[]);byFase[idx].push(d);});
  // analistas
  const analistas=S.usuarios.filter(u=>['Analista Sênior','Analista','Assistente','Estagiário'].includes(u.cargo));
  const byA=analistas.map(u=>{const n=S.deals.filter(d=>d.analista===u.nome||d.gerente===u.nome).length;return{nome:u.nome,n,id:u.id};}).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const maxA=Math.max(...byA.map(x=>x.n),1);
  return`
  <div class="kpis k5">

function renderPipeline(){
  const at=ativos(filtrados());

  at.forEach(d=>{const n=Object.values(d.etapas||{}).filter(v=>v==='done').length;let f=fases[0];if(n>=10)f=fases[5];else if(n>=8)f=fases[4];else if(n>=6)f=fases[3];else if(n>=4)f=fases[2];else if(n>=2)f=fases[1];mapa[f].push(d);});

function renderReceita(){
  const at=ativos();
  const periodoOpts=S.filtroPeriodoTipo==='mensal'?getMeses():getTrims();
  const filtrarPor=(data)=>{if(!S.filtroPeriodo)return true;if(S.filtroPeriodoTipo==='mensal'){const[y,m]=S.filtroPeriodo.split('-');if(!y||!m)return true;const d=new Date(data);return d.getFullYear()===parseInt(y)&&d.getMonth()+1===parseInt(m);}return true;};
  const recFilt=S.recReal.filter(r=>filtrarPor(r.data_pagamento));
  const tRet=at.reduce((s,d)=>s+(d.retainer_f2||0),0);
  const tSF=at.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  const tReal=recFilt.reduce((s,r)=>s+(r.valor||0),0);
  const tRetReal=recFilt.filter(r=>r.tipo==='retainer').reduce((s,r)=>s+(r.valor||0),0);
  const tSFReal=recFilt.filter(r=>r.tipo==='success_fee').reduce((s,r)=>s+(r.valor||0),0);
  // success fees de projetos fechados e ganhos
  const ganhos=S.deals.filter(d=>d.resultado==='Fechado e Ganho');
  const sfGanhos=ganhos.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  return`

    <div class="seg"><button class="seg-btn ${S.filtroPeriodoTipo==='mensal'?'active':''}" onclick="S.filtroPeriodoTipo='mensal';S.filtroPeriodo='';render()">Mensal</button><button class="seg-btn ${S.filtroPeriodoTipo==='trimestral'?'active':''}" onclick="S.filtroPeriodoTipo='trimestral';S.filtroPeriodo='';render()">Trimestral</button></div>

    <div class="kpi ac3"><div class="kl">SF realizado (ganhos)</div><div class="kv">${fmt(sfGanhos)}</div><div class="ks">${ganhos.length} projeto${ganhos.length!==1?'s':''} fechados</div></div>
    <div class="kpi ac2"><div class="kl">Realizado no período</div><div class="kv">${fmt(tReal)}</div><div class="ks">Ret: ${fmt(tRetReal)} · SF: ${fmt(tSFReal)}</div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="ct">Projeção vs Realizado</div>
      ${[...at].sort((a,b)=>(b.retainer_f2||0)-(a.retainer_f2||0)).map((d,i,a)=>{const sf=(d.deal_value||0)*((d.success_fee||0)/100);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:${i<a.length-1?'1px solid var(--border)':'none'}"><div><div style="font-size:12px;font-weight:600">${d.cliente}</div><div style="font-size:10px;color:var(--text2)">${d.success_fee||0}% SF · ${fmt(d.retainer_f2)}/mês</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:700;color:var(--cyan)">${fmt(sf)}</div>${bdg(d.prob||'—',PC[d.prob]||'#888')}</div></div>`;}).join('')||`<div class="empty">Sem dados</div>`}

function renderHoras(){

  const bU={};S.horas.forEach(h=>{bU[h.usuario_id]=(bU[h.usuario_id]||0)+(h.horas||0);});
  const bD={};S.horas.forEach(h=>{bD[h.deal_id]=(bD[h.deal_id]||0)+(h.horas||0);});
  return`
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn" onclick="openAddHora()">+ Lançar horas</button></div>
  <div class="kpis k3"><div class="kpi ac"><div class="kl">Total horas</div><div class="kv">${tH.toFixed(1)}h</div></div><div class="kpi"><div class="kl">Colaboradores</div><div class="kv">${Object.keys(bU).length}</div></div><div class="kpi"><div class="kl">Projetos</div><div class="kv">${Object.keys(bD).length}</div></div></div>
  <div class="g2">
    <div class="card"><div class="ct">Por colaborador</div>${Object.entries(bU).map(([uid,h])=>{const u=S.usuarios.find(x=>x.id===uid);const pct=tH?Math.round(h/tH*100):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600">${u?u.nome:uid}</span><span style="color:var(--blue)">${h.toFixed(1)}h</span></div><div style="height:5px;background:var(--bg3);border-radius:3px"><div style="height:5px;background:var(--blue);border-radius:3px;width:${pct}%"></div></div></div>`;}).join('')||`<div class="empty">Sem registros</div>`}</div>
    <div class="card"><div class="ct">Por projeto</div>${Object.entries(bD).map(([did,h])=>{const d=S.deals.find(x=>x.id===did);const pct=tH?Math.round(h/tH*100):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600">${d?d.cliente:did}</span><span style="color:var(--blue)">${h.toFixed(1)}h</span></div><div style="height:5px;background:var(--bg3);border-radius:3px"><div style="height:5px;background:var(--cyan);border-radius:3px;width:${pct}%"></div></div></div>`;}).join('')||`<div class="empty">Sem registros</div>`}</div>
  </div>
  <div class="card"><div class="ct">Lançamentos recentes</div>${S.horas.length===0?`<div class="empty">Nenhuma hora.</div>`:`
  <table><thead><tr><th>Colaborador</th><th>Projeto</th><th>Fase</th><th>Horas</th><th>Data</th><th>Descrição</th><th></th></tr></thead>
  <tbody>${S.horas.slice(0,20).map(h=>{const u=S.usuarios.find(x=>x.id===h.usuario_id);const d=S.deals.find(x=>x.id===h.deal_id);return`<tr><td style="font-weight:600">${u?u.nome:'—'}</td><td style="color:var(--text2)">${d?d.cliente:'—'}</td><td style="color:var(--text2)">${h.fase||'—'}</td><td style="font-weight:600;color:var(--blue)">${h.horas}h</td><td style="color:var(--text2)">${h.data||'—'}</td><td style="color:var(--text2);font-size:11px">${h.descricao||''}</td><td><button class="bdg bsm" onclick="hDelHora('${h.id}')">✕</button></td></tr>`;}).join('')}</tbody></table>`}</div>`;
}

async function delRecReal(id){await delRecReal_fn(id);}
async function delRecReal_fn(id){await sb.from('receita_realizada').delete().eq('id',id);S.recReal=S.recReal.filter(x=>x.id!==id);render();}

// ═══ CHARTS ═══
function destroyCharts(){Object.values(S.charts).forEach(c=>{try{c.destroy();}catch{}});S.charts={};}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;try{S.charts[id]=new Chart(el,cfg);}catch{}}
function initCharts(){
  destroyCharts();
  const at=ativos(filtrados());const fl=S.seg==='ma'?at.filter(d=>d.tipo==='M&A'):S.seg==='dcm'?at.filter(d=>d.tipo==='DCM'):at;
  const lbl={color:'#8899B0',font:{size:10},boxWidth:10};const grid={color:'rgba(255,255,255,0.04)'};
  if(S.page==='dashboard'){
    const byM={};fl.forEach(d=>{byM[d.mandato]=(byM[d.mandato]||0)+(d.deal_value||0);});
    if(Object.keys(byM).length)mkChart('cM',{type:'doughnut',data:{labels:Object.keys(byM),datasets:[{data:Object.values(byM),backgroundColor:PAL,borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{labels:lbl}},responsive:true,maintainAspectRatio:false}});
    const bySt={};S.deals.forEach(d=>{bySt[d.status]=(bySt[d.status]||0)+1;});
    if(Object.keys(bySt).length)mkChart('cS',{type:'doughnut',data:{labels:Object.keys(bySt),datasets:[{data:Object.values(bySt),backgroundColor:Object.keys(bySt).map(k=>SC[k]||'#888'),borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{labels:lbl}},responsive:true,maintainAspectRatio:false}});
  }
}

// ═══ RENDER ═══
function render(){
  const app=document.getElementById('app');
  if(!S.loggedIn){
    app.innerHTML=`<div class="login-wrap"><div class="login-card">
      <div style="text-align:center;margin-bottom:24px">
        <div style="display:flex;justify-content:center;margin-bottom:10px"><div style="width:40px;height:40px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center"><div style="width:14px;height:14px;background:var(--bg2);transform:rotate(45deg)"></div></div></div>
        <div style="font-size:22px;font-weight:700;letter-spacing:3px">APEX</div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:.5px">Investment Banking Platform</div>
      </div>
      <div class="lf"><label>E-mail</label><input type="email" value="${S.loginEmail}" oninput="S.loginEmail=this.value" placeholder="seu@apexpartners.com.br" onkeydown="if(event.key==='Enter')tentarLogin()"/></div>
      <div class="lf"><label>Senha</label><input type="password" value="${S.loginSenha}" oninput="S.loginSenha=this.value" placeholder="••••••••" onkeydown="if(event.key==='Enter')tentarLogin()"/></div>
      <button class="login-btn" onclick="tentarLogin()">Entrar</button>
      ${S.loginErr?`<div class="login-err">${S.loginErr}</div>`:''}
    </div></div>`;return;
  }
  const syncTime=S.lastSync?S.lastSync.toLocaleTimeString('pt-BR'):'—';const u=S.currentUser;
  let content='';
  if(S.loading){content=`<div style="display:flex;align-items:center;justify-content:center;padding:80px;gap:12px;color:var(--text2)"><div class="spinner"></div>Carregando...</div>`;}
  else if(S.detail&&S.detailType==='analista'){
    content=`<div class="topbar"><div><div class="page-title">Perfil do colaborador</div></div><div style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</div></div>${renderPerfilAnalista(S.detail)}`;
  } else if(S.detail&&S.detailType==='deal'){
    const d=S.deals.find(x=>x.id===S.detail);
    content=`<div class="topbar"><div><div class="page-title">Detalhes do projeto</div><div class="page-sub">${d?.cliente||''}</div></div><div style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</div></div>${d?renderDetalhe(d):`<div class="empty">Não encontrado.</div>`}`;
  } else {
    const hasSeg=['dashboard','pipeline'].includes(S.page);
    const topbar=`<div class="topbar"><div><div class="page-title">${TITLES[S.page]||''}</div><div class="page-sub">${SUBS[S.page]||''}</div></div>
    <div class="topbar-right">
      <span style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</span>
      ${hasSeg?`<div class="seg"><button class="seg-btn ${S.seg==='geral'?'active':''}" onclick="S.seg='geral';render()">Geral</button><button class="seg-btn ${S.seg==='ma'?'active':''}" onclick="S.seg='ma';render()">M&A</button><button class="seg-btn ${S.seg==='dcm'?'active':''}" onclick="S.seg='dcm';render()">DCM</button></div>`:''}
      ${hasSeg?`<select class="fsel" onchange="S.filtroColab=this.value;render()"><option value="">Todos os colaboradores</option>${S.usuarios.map(uu=>`<option value="${uu.nome}"${S.filtroColab===uu.nome?' selected':''}>${uu.nome}</option>`).join('')}</select>`:''}
    </div></div>`;
    switch(S.page){
      case'dashboard':content=topbar+renderDash();break;
      case'pipeline':content=topbar+renderPipeline();break;
      case'ma':case'dcm':case'encerrados':content=topbar+renderProjetos();break;
      case'receita':content=topbar+renderReceita();break;
      case'horas':content=topbar+renderHoras();break;
      case'equipe':content=topbar+renderEquipe();break;
      case'tarefas':content=topbar+renderTarefas();break;
    }
  }
  const sidebar=`<div class="sidebar">
    <div class="sidebar-logo"><div class="logo-row"><div class="logo-box"><div class="logo-diamond"></div></div><div><div class="logo-txt">APEX</div><div class="logo-sub">Investment Banking</div></div></div></div>
    ${NAV.map(n=>n.s?`<div class="nav-section">${n.s}</div>`:
    `<div class="nav-item ${S.page===n.k&&!S.detail?'active':''}" onclick="S.page='${n.k}';S.detail=null;S.detailType=null;render()"><span class="nav-icon">${n.i}</span>${n.l}</div>`).join('')}
    <div style="flex:1"></div>
    <div class="sidebar-footer">
      <div class="user-chip"><div class="av">${ini(u?.nome||'A')}</div><div><div style="font-size:12px;font-weight:600;color:var(--text)">${u?.nome||'Admin'}</div><div style="font-size:10px;color:var(--text2)">${u?.cargo||''} · ${u?.polo||''}</div></div></div>
      <button class="theme-btn" onclick="toggleTheme()">${S.theme==='dark'?'☀️ Modo claro':'🌙 Modo escuro'}</button>
      <button class="logout-btn" onclick="logout()">↗ Sair</button>
    </div>
  </div>`;
  const modal=S.modal==='deal'?mDeal():S.modal==='user'?mUser():S.modal==='hora'?mHora():S.modal==='recreal'?mRecReal():S.modal==='tarefa'?mTarefa():'';
  app.innerHTML=`<div class="layout">${sidebar}<div class="main">${content}<div class="footer-bar">APEX PARTNERS — DOCUMENTO CONFIDENCIAL</div></div></div>${modal}`;
  if(!S.loading&&!S.detail)setTimeout(initCharts,80);
}

async function init(){
  if(S.loggedIn){await loadAll();}else{render();}
  setInterval(()=>{if(S.loggedIn)loadAll();},60000);
}
init();
</script>
</body>
</html>
