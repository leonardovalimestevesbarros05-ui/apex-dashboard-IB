.sf-wrap{overflow-x:auto;padding:8px 0 16px}
.sf-track{display:flex;align-items:flex-start;min-width:max-content}
.sf-step{display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer;min-width:80px}
.sf-step:not(:last-child)::after{content:'';position:absolute;top:18px;left:calc(50% + 18px);width:calc(100% - 12px);height:2px;background:var(--border2);z-index:0}
.sf-step.done::after{background:var(--green)!important}

.sf-step.done .sf-circle{background:var(--green);border-color:var(--green);color:#fff}

.hist-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px}

.pipe-body{background:var(--bg3);border-radius:0 0 8px 8px;padding:8px;min-height:80px}
.pipe-card{background:var(--card);border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border);border-left:3px solid var(--blue);cursor:pointer}
.pipe-card:hover{border-left-color:var(--cyan)}
/* TAGS */
.tg{background:rgba(34,197,94,.15);color:var(--green);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.tp{background:rgba(239,68,68,.15);color:var(--red);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.tc{background:rgba(245,158,11,.15);color:var(--amber);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.tcan{background:rgba(100,116,139,.15);color:#64748B;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
/* TAREFA */
.tarefa-card{background:var(--card);border-radius:10px;padding:12px 14px;border:1px solid var(--border);margin-bottom:8px;border-left:4px solid var(--blue)}
.tarefa-card.Alta{border-left-color:var(--red)}.tarefa-card.Normal{border-left-color:var(--blue)}.tarefa-card.Baixa{border-left-color:var(--green)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--text2)}
.cw{position:relative;height:200px;margin-top:6px}
.cw-lg{position:relative;height:280px;margin-top:6px}
.footer-bar{text-align:center;margin-top:24px;padding-top:14px;border-top:1px solid var(--border);font-size:10px;color:var(--text2);letter-spacing:2px}
@media(max-width:900px){.k4,.k5,.k6{grid-template-columns:repeat(2,1fr)}.g2,.g3{grid-template-columns:1fr}}
</style>
</head>

function dealScore(d){
  // 0-100: fase (40%) + prob (40%) + atividade recente (20%)
  const totalFases=d.tipo==='DCM'?FASES_DCM.length:FASES.length;
  const feitas=Object.values(d.etapas||{}).filter(v=>v==='done').length;
  const faseScore=(feitas/totalFases)*40;
  const probScore=({Alta:40,Média:24,Baixa:8}[d.prob]||16);
  // aging penalty: -2 per week after 4 weeks
  const criado=d.created_at?new Date(d.created_at):new Date();
  const semanas=Math.max(0,(new Date()-criado)/(1000*60*60*24*7)-4);
  const agingPenalty=Math.min(20,semanas*2);
  const score=Math.round(Math.max(0,Math.min(100,faseScore+probScore+20-agingPenalty)));
  const cor=score>=70?'var(--green)':score>=40?'var(--amber)':'var(--red)';
  return{score,cor};
}

function agingDias(d){
  if(!d.created_at)return 0;
  return Math.round((new Date()-new Date(d.created_at))/(1000*60*60*24));
}

function getMeses(){const r=[];const now=new Date();for(let i=0;i<18;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);r.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}return r;}
function getAnos(){const r=[];const y=new Date().getFullYear();for(let i=0;i<5;i++)r.push(String(y-i));return r;}
function dentroDoFiltro(dataStr){
  if(!dataStr||!S.filtroPeriodo||S.filtroPeriodo==='total')return true;
  const d=new Date(dataStr);
  if(S.filtroPeriodoTipo==='mensal'){const[y,m]=S.filtroPeriodo.split('-');return d.getFullYear()===parseInt(y)&&d.getMonth()+1===parseInt(m);}

  return true;
}

async function importSheets(){
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=Contratos`);
    const csv=await res.text();const rows=parseCSV(csv);if(rows.length<2)return;
    const ex=new Set(S.deals.map(d=>d.arquivo).filter(Boolean));const toI=[];
    rows.slice(1).forEach(row=>{
      const g=i=>i<row.length?String(row[i]||'').trim():'';
      const arq=g(0);if(!arq||ex.has(arq))return;
      const st=g(29)||'Ativo';if(st==='ERRO NA EXTRACAO')return;
      const ret=pN(g(13));
      toI.push({source:'sheets',arquivo:arq,data_extracao:g(1),cliente:g(2)||arq,cnpj:g(3),contato:g(4),email:g(5),projeto:g(6)||arq,mandato:g(7)||'outro',descricao:g(8),data_assinatura:g(9),data_inicio:g(10),retainer_f1:15000,retainer_f2:ret||7000,success_fee:pN(g(16)),success_fee_min:pN(g(17)),success_fee_base:g(18),deal_value:pN(g(19)),obs:g(23),diretor:g(24),gerente:g(25),analista:g(26),setor:g(27),status:st,status_fat:g(30)||'Pendente',tipo:'M&A',polo:'ES',prob:'Alta',etapas:{},fase_atual:0,parcelas:[]});
    });
    if(toI.length){const{data:ins}=await sb.from('deals').insert(toI).select();if(ins)S.deals=[...ins,...S.deals];}
  }catch(e){console.error(e);}
}
function parseCSV(t){const r=[];for(const l of t.split('\n')){if(!l.trim())continue;const row=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){row.push(c.trim());c='';}else c+=ch;}row.push(c.trim());r.push(row);}return r;}

// ═══ STEPPER ═══
function sfStepper(d){
  const et=d.etapas||{};const feitas=Object.values(et).filter(v=>v==='done').length;const pct=Math.round(feitas/FASES.length*100);
  const rF=(fases,offset)=>fases.map((e,i)=>{const idx=offset+i;const done=et[idx]==='done';const isAct=!done&&idx===feitas;
    return`<div class="sf-step ${done?'done':isAct?'active':''}" onclick="hSetEtapa('${d.id}',${idx})" title="${done?'Clique para reabrir':'Marcar como concluído'}">
      <div class="sf-circle">${done?'✓':idx+1}</div><div class="sf-label">${e.n}</div>
    </div>`;}).join('');
  const f1=FASES.filter(x=>x.f===1);const f2=FASES.filter(x=>x.f===2);
  return`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:12px;font-weight:600">Progresso: <span style="color:var(--blue)">${pct}%</span> — ${feitas}/${FASES.length} etapas</div>
    </div>
    <div style="height:6px;background:var(--bg3);border-radius:3px;margin-bottom:18px;overflow:hidden"><div style="height:6px;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:3px;width:${pct}%;transition:width .4s"></div></div>
    <div class="sf-fase-lbl">Fase 1 — Preparation & Marketing</div>
    <div class="sf-wrap"><div class="sf-track">${rF(f1,0)}</div></div>
    <div class="sf-fase-lbl" style="margin-top:8px;color:var(--cyan)">Fase 2 — Execution & Closing</div>
    <div class="sf-wrap"><div class="sf-track">${rF(f2,6)}</div></div>
  </div>`;
}

// ═══ DCM STEPPER ═══
function dcmStepper(d){
  const et=d.etapas||{};
  const total=FASES_DCM.length;
  const feitas=Object.values(et).filter(v=>v==='done').length;
  const pct=Math.round(feitas/total*100);
  const f1=FASES_DCM.filter(x=>x.f===1);
  const f2=FASES_DCM.filter(x=>x.f===2);
  const rF=(fases,offset)=>fases.map((e,i)=>{
    const idx=offset+i;const done=et[idx]==='done';const isAct=!done&&idx===feitas;
    return`<div class="sf-step ${done?'done':isAct?'active':''}" onclick="hSetEtapaDCM('${d.id}',${idx})" title="${e.d}">
      <div class="sf-circle">${done?'✓':idx+1}</div>
      <div class="sf-label">${e.n}</div>
    </div>`;}).join('');
  return`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:12px;font-weight:600">Progresso: <span style="color:var(--cyan)">${pct}%</span> — ${feitas}/${total} etapas</div>
    </div>
    <div style="height:6px;background:var(--bg3);border-radius:3px;margin-bottom:18px;overflow:hidden">
      <div style="height:6px;background:linear-gradient(90deg,var(--cyan),#0052A3);border-radius:3px;width:${pct}%;transition:width .4s"></div>
    </div>
    <div class="sf-fase-lbl" style="background:rgba(0,180,216,.1);color:var(--cyan)">Fase 1 — Preparação & Estruturação</div>
    <div class="sf-wrap"><div class="sf-track">${rF(f1,0)}</div></div>
    <div class="sf-fase-lbl" style="margin-top:8px;background:rgba(0,120,212,.1);color:var(--blue)">Fase 2 — Distribuição & Liquidação</div>
    <div class="sf-wrap"><div class="sf-track">${rF(f2,4)}</div></div>
  </div>`;
}

// ═══ COMENTÁRIOS ═══
function renderComts(dealId,idx,comtsD){
  const k=`${dealId}_${idx}`;const sh=S.novoComt[`sh_${k}`];const comtsEt=comtsD.filter(c=>c.etapa_idx===idx);const u=S.currentUser;
  if(!sh&&!comtsEt.length)return`<button class="bgh bsm" style="margin-top:4px" onclick="togComt('${k}')">💬 Comentar</button>`;
  return`<div style="margin-top:6px">
    ${!sh&&comtsEt.length?`<button class="bgh bsm" onclick="togComt('${k}')">💬 ${comtsEt.length} comentário${comtsEt.length!==1?'s':''}</button>`:''}
    ${sh?`<div>
      ${comtsEt.map(c=>{const isE=S.editandoComt?.id===c.id;const isMine=c.usuario_id===u?.id;return`<div class="cmt-item">
        <div class="cmt-meta"><span><strong>${c.usuario_nome||'—'}</strong> · ${fmtTS(c.created_at)}</span>
        ${isMine?`<div class="cmt-actions">
          ${isE?`<button class="bgh bsm" onclick="cancelEditComt()">Cancelar</button><button class="btn bsm" onclick="saveEditComt()">Salvar</button>`:
          `<button class="bgh bsm" onclick="startEditComt('${c.id}','${c.texto.replace(/'/g,"\\'")}')">Editar</button><button class="bdg bsm" onclick="hDelComt('${c.id}')">✕</button>`}
        </div>`:''}
        </div>
        ${isE?`<input style="width:100%;background:var(--input);border:1px solid var(--blue);border-radius:6px;padding:6px 9px;color:var(--text);font-size:12px;font-family:inherit;outline:none" value="${S.editandoComt.txt}" oninput="S.editandoComt.txt=this.value"/>`:
        `<div class="cmt-text">${c.texto}</div>`}
      </div>`;}).join('')}
      <div class="cmt-inp">
        <input id="cinput_${k}" placeholder="Adicionar comentário..." oninput="S.novoComt['${k}']=this.value" onkeydown="if(event.key==='Enter')hAddComt('${dealId}',${idx})"/>
        <button class="btn bsm" onclick="hAddComt('${dealId}',${idx})">Enviar</button>
      </div>
      <button class="bgh bsm" style="margin-top:6px" onclick="togComt('${k}')">Fechar</button>
    </div>`:''}
  </div>`;
}

// ═══ DETALHE PROJETO ═══
function renderDetalhe(d){
  const et=d.etapas||{};const feitas=Object.values(et).filter(v=>v==='done').length;
  const fasesTotal=d.tipo==='DCM'?FASES_DCM.length:FASES.length;
  const horasD=S.horas.filter(h=>h.deal_id===d.id);const totalH=horasD.reduce((s,h)=>s+(h.horas||0),0);
  const bib=horasD.filter(h=>h.tipo_hora==='BIB').reduce((s,h)=>s+(h.horas||0),0);
  const nib=horasD.filter(h=>h.tipo_hora!=='BIB').reduce((s,h)=>s+(h.horas||0),0);
  const eq=[{r:'Diretor',n:d.diretor},{r:'Gerente',n:d.gerente},{r:'Analista',n:d.analista}].filter(p=>p.n);
  const sf=(d.deal_value||0)*((d.success_fee||0)/100);
  const pct=Math.round(feitas/fasesTotal*100);
  const histD=S.historico.filter(h=>h.deal_id===d.id);
  const comtsD=S.comentarios.filter(c=>c.deal_id===d.id);
  return`
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div>
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        ${bdg(d.tipo,d.tipo==='M&A'?'#0078D4':'#00B4D8')}${bdg(d.mandato,MC[d.mandato]||'#888')}${bdg(d.status,SC[d.status]||'#888')}${bdg(d.prob||'Alta',PC[d.prob]||'#888')}${pt(d.polo)}
        ${d.resultado?resTag(d.resultado):''}
      ${classBdg(d.classificacao)}
      ${(()=>{const{score,cor}=dealScore(d);return score?`<span style="background:${cor}22;color:${cor};font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px">Score ${score}</span>`:''})()}
      </div>
      <h2 style="font-size:19px;font-weight:700">${d.projeto||d.cliente}</h2>
      <div style="font-size:12px;color:var(--text2);margin-top:3px">${d.cliente}${d.cnpj?' · CNPJ '+d.cnpj:''}${d.setor?' · '+d.setor:''}</div>
      ${d.motivo_encerramento?`<div style="margin-top:6px;font-size:11px;color:var(--amber)">Motivo: ${d.motivo_encerramento}</div>`:''}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="bgh bsm" onclick="exportPDF('${d.id}')">📄 PDF</button>
      <button class="bgh" onclick="openEditDeal('${d.id}')">Editar</button>
      <button class="bgh" onclick="S.detail=null;S.detailType=null;render()">← Voltar</button>
    </div>
  </div>
  <div class="kpis k4">
    <div class="kpi ac"><div class="kl">Deal value</div><div class="kv">${fmt(d.deal_value)}</div></div>
    <div class="kpi"><div class="kl">Retainer F2/mês</div><div class="kv">${fmt(d.retainer_f2)}</div><div class="ks">F1: ${fmt(d.retainer_f1||15000)} × 2</div></div>
    <div class="kpi"><div class="kl">Success fee</div><div class="kv">${d.success_fee||0}%</div><div class="ks">${fmt(sf)} potencial</div></div>
    <div class="kpi"><div class="kl">Horas</div><div class="kv">${totalH.toFixed(1)}h</div><div class="ks"><span class="bib-tag">BIB ${bib.toFixed(1)}h</span> <span class="nib-tag">NIB ${nib.toFixed(1)}h</span></div></div>
    <div class="kpi" style="${agingDias(d)>60?'background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2)':agingDias(d)>30?'background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)':''}"><div class="kl">Aging</div><div class="kv" style="font-size:18px;color:${agingDias(d)>60?'var(--red)':agingDias(d)>30?'var(--amber)':'var(--text)'}">${agingDias(d)}d</div><div class="ks">Dias desde abertura</div></div>
  </div>
  <div class="card">
    <div class="ct">Progresso das Fases ${d.tipo==='DCM'?'DCM':'M&A'}</div>
    ${d.tipo==='DCM'?dcmStepper(d):sfStepper(d)}
    <div style="margin-top:18px;border-top:1px solid var(--border);padding-top:14px">
      ${(d.tipo==='DCM'?FASES_DCM:FASES).map((e,i)=>{
        const done=et[i]==='done';
        return`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">

  const totalH=horasU.reduce((s,h)=>s+(h.horas||0),0);
  const bib=horasU.filter(h=>h.tipo_hora==='BIB').reduce((s,h)=>s+(h.horas||0),0);
  const nib=horasU.filter(h=>h.tipo_hora!=='BIB').reduce((s,h)=>s+(h.horas||0),0);
  const byDeal={};horasU.forEach(h=>{byDeal[h.deal_id]=(byDeal[h.deal_id]||0)+(h.horas||0);});

  const totalRet=deals.filter(d=>d.status!=='Concluído'&&d.status!=='Congelado').reduce((s,d)=>s+(d.retainer_f2||0),0);
  const totalSF=deals.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  const ganhos=deals.filter(d=>d.resultado==='Fechado e Ganho');
  const sfRealizado=ganhos.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  const recRealU=S.recReal.filter(r=>deals.find(d=>d.id===r.deal_id)).reduce((s,r)=>s+(r.valor||0),0);
  return`

    <div style="display:flex;align-items:center;gap:16px">

        <h2 style="font-size:18px;font-weight:700">${u.nome}</h2>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">${u.cargo} · ${pt(u.polo)} · ${u.area||'—'}</div>
        ${u.gestor?`<div style="font-size:11px;color:var(--text2);margin-top:2px">Gestor: ${u.gestor}</div>`:''}
      </div>

    <div style="display:flex;gap:8px">
      <button class="btn bsm" onclick="openAddHora()">+ Lançar horas</button>

    </div>
  </div>
  <div class="kpis k6">

    <div class="kpi"><div class="kl">Horas NIB</div><div class="kv">${nib.toFixed(1)}h</div></div>
    <div class="kpi ac2"><div class="kl">Retainer mensal</div><div class="kv">${fmt(totalRet)}</div></div>
    <div class="kpi"><div class="kl">Fee potencial</div><div class="kv">${fmt(totalSF)}</div></div>
    <div class="kpi ac3"><div class="kl">Fee realizado</div><div class="kv">${fmt(sfRealizado)}</div><div class="ks">Receita: ${fmt(recRealU)}</div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="ct">Horas por projeto</div>
      ${Object.entries(byDeal).length===0?`<div class="empty" style="padding:16px">Sem horas</div>`:
      Object.entries(byDeal).map(([did,h])=>{const d=S.deals.find(x=>x.id===did);const mx=Math.max(...Object.values(byDeal),1);const pct=Math.round(h/mx*100);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600">${d?d.cliente:did}</span><span style="color:var(--blue)">${h.toFixed(1)}h</span></div><div style="height:6px;background:var(--bg3);border-radius:3px"><div style="height:6px;background:var(--blue);border-radius:3px;width:${pct}%"></div></div></div>`;}).join('')}

      Object.entries(byFase).map(([fase,h])=>{const mx=Math.max(...Object.values(byFase),1);const pct=Math.round(h/mx*100);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600">${fase}</span><span style="color:var(--cyan)">${h.toFixed(1)}h</span></div><div style="height:6px;background:var(--bg3);border-radius:3px"><div style="height:6px;background:var(--cyan);border-radius:3px;width:${pct}%"></div></div></div>`;}).join('')}
    </div>
  </div>
  <div class="card"><div class="ct">Projetos do colaborador</div>
    ${deals.length===0?`<div class="empty">Nenhum projeto</div>`:`

    <tbody>${deals.map(d=>{const papel=d.diretor===u.nome?'Diretor':d.gerente===u.nome?'Gerente':'Analista';const feitas=Object.values(d.etapas||{}).filter(v=>v==='done').length;const fasesTotal=d.tipo==='DCM'?FASES_DCM.length:FASES.length;const pct=Math.round(feitas/fasesTotal*100);const sf=(d.deal_value||0)*((d.success_fee||0)/100);return`<tr><td style="font-weight:600;cursor:pointer;color:var(--blue)" onclick="S.detail='${d.id}';S.detailType='deal';render()">${d.cliente}</td><td>${bdg(papel,'#0078D4')}</td><td>${bdg(d.status,SC[d.status]||'#888')}</td><td style="font-weight:600">${fmt(d.deal_value)}</td><td style="color:var(--cyan)">${fmt(sf)}</td><td><div style="min-width:80px"><div style="font-size:10px;color:var(--text2);margin-bottom:2px">${pct}%</div><div style="height:4px;background:var(--bg3);border-radius:2px"><div style="height:4px;background:var(--blue);border-radius:2px;width:${pct}%"></div></div></div></td><td><button class="btn bsm" onclick="S.detail='${d.id}';S.detailType='deal';render()">Ver</button></td></tr>`;}).join('')}</tbody></table>`}
  </div>`;
}

// ═══ PÁGINAS ═══
function filtrados(){let l=S.deals;if(S.filtroColab)l=l.filter(d=>d.diretor===S.filtroColab||d.gerente===S.filtroColab||d.analista===S.filtroColab);return l;}
function ativos(l){return(l||S.deals).filter(d=>d.status!=='Concluído'&&!['Fechado e Ganho','Fechado e Perdido','Cancelado','Congelado'].includes(d.resultado)||d.resultado==='Ativo');}

function renderDash(){
  const all=filtrados();const at=ativos(all);
  const fl=S.seg==='ma'?at.filter(d=>d.tipo==='M&A'):S.seg==='dcm'?at.filter(d=>d.tipo==='DCM'):at;
  const tDV=fl.reduce((s,d)=>s+(d.deal_value||0),0);
  const tRet=fl.reduce((s,d)=>s+(d.retainer_f2||0),0);
  const tSF=fl.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  const rPond=fl.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100)*({Alta:.8,Média:.5,Baixa:.2}[d.prob]||.5),0);
  const tH=S.horas.reduce((s,h)=>s+(h.horas||0),0);
  const byM={};fl.forEach(d=>{byM[d.mandato]=(byM[d.mandato]||0)+(d.deal_value||0);});
  const bySt={};S.deals.forEach(d=>{bySt[d.status]=(bySt[d.status]||0)+1;});
  // fases separadas
  const f1Names=['Kickoff','Análise','Valuation','Materiais','Buyers','Go-to-mkt'];
  const f2Names=['IO/NBO','Negoc.','LOI/MOU','Due Dilig.','Contratos','Closing'];
  const byFase1={};f1Names.forEach((n,i)=>byFase1[i]=[]);
  const byFase2={};f2Names.forEach((n,i)=>byFase2[i]=[]);
  fl.forEach(d=>{const n=Object.values(d.etapas||{}).filter(v=>v==='done').length;if(n<6)byFase1[n]=(byFase1[n]||[]).concat(d);else byFase2[n-6]=(byFase2[n-6]||[]).concat(d);});
  // analistas
  const analistas=S.usuarios.filter(u=>['Analista Sênior','Analista','Assistente','Estagiário','Gerente'].includes(u.cargo));
  const byA=analistas.map(u=>{const n=S.deals.filter(d=>d.analista===u.nome||d.gerente===u.nome).length;return{nome:u.nome,n,id:u.id};}).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const maxA=Math.max(...byA.map(x=>x.n),1);
  return`
  <div class="kpis k5">
    <div class="kpi ac"><div class="kl">Projetos ativos</div><div class="kv">${fl.length}</div><div class="ks">${S.deals.filter(d=>d.resultado==='Fechado e Ganho').length} fechados e ganhos</div></div>
    <div class="kpi"><div class="kl">Deal value</div><div class="kv">${fmt(tDV)}</div></div>
    <div class="kpi"><div class="kl">SF potencial</div><div class="kv">${fmt(tSF)}</div></div>
    <div class="kpi ac2"><div class="kl">Receita ponderada</div><div class="kv">${fmt(rPond)}</div><div class="ks">Por probabilidade</div></div>
    <div class="kpi"><div class="kl">MRR retainers</div><div class="kv">${fmt(tRet)}</div><div class="ks">${tH.toFixed(0)}h registradas</div></div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="ct" style="margin:0">📊 Pipeline → Receita Esperada</div>
      <span style="font-size:10px;color:var(--text2)">Baseado em deal value × success fee × probabilidade</span>
    </div>
    <div class="kpis k5" style="margin-bottom:0">
      <div class="kpi" style="background:var(--bg3)"><div class="kl">Pipeline ponderado</div><div class="kv" style="font-size:18px">${fmt(rPond)}</div><div class="ks">Alta×0.8 / Média×0.5 / Baixa×0.2</div></div>
      <div class="kpi" style="background:var(--bg3)"><div class="kl">SF esperado total</div><div class="kv" style="font-size:18px">${fmt(fl.filter(d=>d.prob==='Alta').reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0))}</div><div class="ks">${fl.filter(d=>d.prob==='Alta').length} deals alta prob.</div></div>
      <div class="kpi" style="background:var(--bg3)"><div class="kl">Retainers ativos/mês</div><div class="kv" style="font-size:18px">${fmt(tRet)}</div><div class="ks">ARR: ${fmt(tRet*12)}</div></div>
      <div class="kpi" style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)"><div class="kl" style="color:var(--green)">Win rate</div><div class="kv" style="font-size:18px;color:var(--green)">${(()=>{const g=S.deals.filter(d=>d.resultado==='Fechado e Ganho').length;const p=S.deals.filter(d=>['Fechado e Ganho','Fechado e Perdido','Cancelado'].includes(d.resultado)).length;return p?Math.round(g/p*100)+'%':'—';})()}</div><div class="ks">Ganhos vs encerrados</div></div>
      <div class="kpi" style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)"><div class="kl" style="color:var(--amber)">Aging médio</div><div class="kv" style="font-size:18px;color:var(--amber)">${(()=>{if(!fl.length)return'—';const avg=fl.reduce((s,d)=>s+agingDias(d),0)/fl.length;return Math.round(avg)+'d';})()}</div><div class="ks">Dias médio aberto</div></div>
    </div>
  </div>
  <div class="g2">
    <div class="card"><div class="ct">Deal value por mandato</div><div class="cw"><canvas id="cM"></canvas></div></div>
    <div class="card"><div class="ct">Status dos projetos</div><div class="cw"><canvas id="cS"></canvas></div></div>
  </div>
  <div class="g2">
    <div class="card">
      <div class="ct">Fases M&A</div>
      <div style="display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:var(--blue)"></div><span style="font-size:11px;color:var(--text2)">Fase 1 — Preparation</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:var(--cyan)"></div><span style="font-size:11px;color:var(--text2)">Fase 2 — Execution</span></div>
      </div>
      <div class="cw-lg"><canvas id="cFases"></canvas></div>
    </div>
    <div class="card">
      <div class="ct">Fases DCM</div>
      <div style="display:flex;gap:16px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:var(--cyan)"></div><span style="font-size:11px;color:var(--text2)">Deals por etapa</span></div>

    </div>
  </div>
  <div class="g2">

      byA.map((x,i)=>{const pct=Math.round(x.n/maxA*100);return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">

        <div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:600;cursor:pointer;color:var(--blue)" onclick="S.detail='${x.id}';S.detailType='analista';render()">${x.nome}</span><span style="font-weight:700">${x.n}</span></div>
        <div style="height:5px;background:var(--bg3);border-radius:3px"><div style="height:5px;background:${PAL[i%PAL.length]};border-radius:3px;width:${pct}%"></div></div></div>
      </div>`;}).join('')}
    </div>
    <div class="card"><div class="ct">Aging dos deals ativos</div>
      ${(()=>{

      })()}
    </div>
    <div class="card"><div class="ct">Por probabilidade</div>
      ${['Alta','Média','Baixa'].map(p=>{const n=fl.filter(d=>d.prob===p).length;const pct=fl.length?Math.round(n/fl.length*100):0;return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:${PC[p]};font-weight:600">${p}</span><span>${n} deal${n!==1?'s':''} (${pct}%)</span></div><div style="height:8px;background:var(--bg3);border-radius:4px"><div style="height:8px;background:${PC[p]};border-radius:4px;width:${pct}%;transition:width .4s"></div></div></div>`;}).join('')}

function renderPipeline(){
  const at=ativos(filtrados());
  const fases=['Preparação','Abordagem','Negociação','Due Diligence','Contratos','Closing'];
  const fasesDCM=['Prospecção','Mandato','Estruturação','Reg. CVM','Roadshow','Precificação','Distribuição','Liquidação'];
  const mapa={};fases.forEach(f=>mapa[f]=[]);
  const mapaDCM={};fasesDCM.forEach(f=>mapaDCM[f]=[]);
  at.filter(d=>d.tipo!=='DCM').forEach(d=>{const n=Object.values(d.etapas||{}).filter(v=>v==='done').length;let f=fases[0];if(n>=10)f=fases[5];else if(n>=8)f=fases[4];else if(n>=6)f=fases[3];else if(n>=4)f=fases[2];else if(n>=2)f=fases[1];mapa[f].push(d);});
  at.filter(d=>d.tipo==='DCM').forEach(d=>{const n=Object.values(d.etapas||{}).filter(v=>v==='done').length;const idx=Math.min(n,fasesDCM.length-1);mapaDCM[fasesDCM[idx]].push(d);});
  const tDV=at.reduce((s,d)=>s+(d.deal_value||0),0);const tSF=at.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  return`
  <div class="kpis k3"><div class="kpi ac"><div class="kl">Pipeline</div><div class="kv">${fmt(tDV)}</div></div><div class="kpi"><div class="kl">SF potencial</div><div class="kv">${fmt(tSF)}</div></div><div class="kpi"><div class="kl">Deals</div><div class="kv">${at.length}</div></div></div>
  <div style="margin-bottom:10px;font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px">M&A</div>
  <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px">
    ${fases.map(f=>`<div class="pipe-col"><div class="pipe-header">${f} <span style="font-size:9px;opacity:.7">${mapa[f].length}</span></div><div class="pipe-body">
      ${mapa[f].length===0?`<div style="font-size:11px;color:var(--text2);text-align:center;padding:12px">—</div>`:mapa[f].map(d=>`<div class="pipe-card" onclick="S.detail='${d.id}';S.detailType='deal';render()"><div style="font-size:12px;font-weight:600;margin-bottom:3px">${d.cliente}</div><div style="font-size:10px;color:var(--text2)">${fmt(d.deal_value||0)} · ${d.success_fee||0}%</div><div style="margin-top:5px">${bdg(d.prob||'—',PC[d.prob]||'#888')}</div></div>`).join('')}
    </div></div>`).join('')}
  </div>
  <div style="margin-bottom:10px;font-size:10px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:1px">DCM</div>
  <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px">
    ${fasesDCM.map(f=>`<div class="pipe-col"><div class="pipe-header" style="border-bottom-color:var(--cyan);color:var(--cyan)">${f} <span style="font-size:9px;opacity:.7">${mapaDCM[f].length}</span></div><div class="pipe-body">
      ${mapaDCM[f].length===0?`<div style="font-size:11px;color:var(--text2);text-align:center;padding:12px">—</div>`:mapaDCM[f].map(d=>`<div class="pipe-card" style="border-left-color:var(--cyan)" onclick="S.detail='${d.id}';S.detailType='deal';render()"><div style="font-size:12px;font-weight:600;margin-bottom:3px">${d.cliente}</div><div style="font-size:10px;color:var(--text2)">${fmt(d.deal_value||0)} · ${d.mandato||'—'}</div><div style="margin-top:5px">${bdg(d.prob||'—',PC[d.prob]||'#888')}</div></div>`).join('')}
    </div></div>`).join('')}
  </div>`;
}

  </div>

function renderHoras(){
  const tH=S.horas.reduce((s,h)=>s+(h.horas||0),0);
  const bib=S.horas.filter(h=>h.tipo_hora==='BIB').reduce((s,h)=>s+(h.horas||0),0);
  const nib=S.horas.filter(h=>h.tipo_hora!=='BIB').reduce((s,h)=>s+(h.horas||0),0);
  const bibPct=tH?Math.round(bib/tH*100):0;
  const nibPct=tH?Math.round(nib/tH*100):0;
  const bU={};S.horas.forEach(h=>{if(!bU[h.usuario_id])bU[h.usuario_id]={bib:0,nib:0};if(h.tipo_hora==='BIB')bU[h.usuario_id].bib+=h.horas||0;else bU[h.usuario_id].nib+=h.horas||0;});
  const bD={};S.horas.forEach(h=>{if(!bD[h.deal_id])bD[h.deal_id]={bib:0,nib:0};if(h.tipo_hora==='BIB')bD[h.deal_id].bib+=h.horas||0;else bD[h.deal_id].nib+=h.horas||0;});
  const bF={};S.horas.forEach(h=>{if(h.fase){if(!bF[h.fase])bF[h.fase]={bib:0,nib:0};if(h.tipo_hora==='BIB')bF[h.fase].bib+=h.horas||0;else bF[h.fase].nib+=h.horas||0;}});
  return`
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn" onclick="openAddHora()">+ Lançar horas</button></div>
  <div class="kpis k4">
    <div class="kpi ac"><div class="kl">Total de horas</div><div class="kv">${tH.toFixed(1)}h</div></div>
    <div class="kpi ac3"><div class="kl">BIB — Billable</div><div class="kv">${bib.toFixed(1)}h</div><div class="ks">${bibPct}% do total</div></div>
    <div class="kpi ac4"><div class="kl">NIB — Non-billable</div><div class="kv">${nib.toFixed(1)}h</div><div class="ks">${nibPct}% do total</div></div>
    <div class="kpi"><div class="kl">Colaboradores</div><div class="kv">${Object.keys(bU).length}</div><div class="ks">${Object.keys(bD).length} projetos</div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="ct">BIB vs NIB por colaborador</div>
      ${Object.entries(bU).map(([uid,h])=>{const u=S.usuarios.find(x=>x.id===uid);const tot=(h.bib||0)+(h.nib||0);const bibP=tot?Math.round(h.bib/tot*100):0;const nibP=100-bibP;return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600;cursor:pointer;color:var(--blue)" onclick="S.detail='${uid}';S.detailType='analista';render()">${u?u.nome:uid}</span><span><span class="bib-tag">${(h.bib||0).toFixed(1)}h</span> <span class="nib-tag">${(h.nib||0).toFixed(1)}h</span></span></div><div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;display:flex"><div style="height:8px;background:var(--green);width:${bibP}%;transition:width .4s"></div><div style="height:8px;background:var(--amber);width:${nibP}%;transition:width .4s"></div></div></div>`;}).join('')||`<div class="empty">Sem horas</div>`}
    </div>
    <div class="card"><div class="ct">BIB vs NIB por projeto</div>
      ${Object.entries(bD).map(([did,h])=>{const d=S.deals.find(x=>x.id===did);const tot=(h.bib||0)+(h.nib||0);const bibP=tot?Math.round(h.bib/tot*100):0;return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600">${d?d.cliente:did}</span><span><span class="bib-tag">${(h.bib||0).toFixed(1)}h</span> <span class="nib-tag">${(h.nib||0).toFixed(1)}h</span></span></div><div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;display:flex"><div style="height:8px;background:var(--green);width:${bibP}%;transition:width .4s"></div><div style="height:8px;background:var(--amber);width:${100-bibP}%;transition:width .4s"></div></div></div>`;}).join('')||`<div class="empty">Sem horas</div>`}
    </div>
  </div>
  ${Object.keys(bF).length?`<div class="card"><div class="ct">Horas por fase</div>
    ${Object.entries(bF).map(([fase,h])=>{const tot=(h.bib||0)+(h.nib||0);const bibP=tot?Math.round(h.bib/tot*100):0;return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600">${fase}</span><span><span class="bib-tag">${(h.bib||0).toFixed(1)}h</span> <span class="nib-tag">${(h.nib||0).toFixed(1)}h</span> <span style="color:var(--text2)">${tot.toFixed(1)}h total</span></span></div><div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;display:flex"><div style="height:8px;background:var(--green);width:${bibP}%;transition:width .4s"></div><div style="height:8px;background:var(--amber);width:${100-bibP}%;transition:width .4s"></div></div></div>`;}).join('')}
  </div>`:''}
  <div class="card"><div class="ct">Lançamentos recentes</div>${S.horas.length===0?`<div class="empty">Nenhuma hora.</div>`:`
  <table><thead><tr><th>Colaborador</th><th>Projeto</th><th>Tipo</th><th>Fase</th><th>Horas</th><th>Data</th><th>Descrição</th><th></th></tr></thead>
  <tbody>${S.horas.slice(0,20).map(h=>{const u=S.usuarios.find(x=>x.id===h.usuario_id);const d=S.deals.find(x=>x.id===h.deal_id);return`<tr><td style="font-weight:600">${u?u.nome:'—'}</td><td style="color:var(--text2)">${d?d.cliente:'—'}</td><td>${h.tipo_hora==='BIB'?'<span class="bib-tag">BIB</span>':'<span class="nib-tag">NIB</span>'}</td><td style="color:var(--text2)">${h.fase||'—'}</td><td style="font-weight:600;color:var(--blue)">${h.horas}h</td><td style="color:var(--text2)">${h.data||'—'}</td><td style="color:var(--text2);font-size:11px">${h.descricao||''}</td><td><button class="bdg bsm" onclick="hDelHora('${h.id}')">✕</button></td></tr>`;}).join('')}</tbody></table>`}</div>`;
}

function renderTarefas(){
  const cu=S.currentUser;
  const minhas=S.tarefas.filter(t=>t.responsavel_id===cu?.id);
  const abertas=minhas.filter(t=>t.status!=='Concluída');const conc=minhas.filter(t=>t.status==='Concluída');
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const vencidas=abertas.filter(t=>{if(!t.prazo)return false;return new Date(t.prazo)<hoje;});
  const corP={'Alta':'var(--red)','Normal':'var(--blue)','Baixa':'var(--green)'};
  const card=t=>{const d=S.deals.find(x=>x.id===t.deal_id);const venc=t.prazo&&new Date(t.prazo)<hoje&&t.status!=='Concluída';return`<div class="tarefa-card ${t.prioridade||'Normal'}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <input type="checkbox" ${t.status==='Concluída'?'checked':''} onchange="toggleTarefa('${t.id}')" style="cursor:pointer;width:14px;height:14px"/>
          <span style="font-size:12px;font-weight:600;text-decoration:${t.status==='Concluída'?'line-through':'none'};color:${t.status==='Concluída'?'var(--text2)':'var(--text)'}">${t.titulo}</span>
          <span style="font-size:10px;font-weight:700;color:${corP[t.prioridade||'Normal']}">${t.prioridade}</span>
          ${bdg(t.status,t.status==='Concluída'?'#22C55E':t.status==='Em andamento'?'#0078D4':'#8899B0')}
        </div>
        ${t.descricao?`<div style="font-size:11px;color:var(--text2);margin-bottom:4px">${t.descricao}</div>`:''}
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          ${d?`<span style="font-size:10px;color:var(--text2)">📁 ${d.cliente}</span>`:''}
          ${t.fase?`<span style="font-size:10px;color:var(--text2)">📌 ${t.fase}</span>`:''}
          ${t.prazo?`<span style="font-size:10px;color:${venc?'var(--red)':'var(--text2)'};font-weight:${venc?700:400}">📅 ${t.prazo}${venc?' ⚠ Vencida':''}</span>`:''}
          <span style="font-size:10px;color:var(--text2)">Aberto por: ${t.criado_por_nome||'—'}</span>
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0"><button class="bgh bsm" onclick="openEditTarefa('${t.id}')">Editar</button><button class="bdg bsm" onclick="hDelTarefa('${t.id}')">✕</button></div>
    </div>
  </div>`;};
  return`
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn" onclick="openAddTarefa()">+ Nova tarefa</button></div>
  <div class="kpis k3">
    <div class="kpi ac"><div class="kl">Minhas tarefas</div><div class="kv">${abertas.length}</div><div class="ks">${conc.length} concluídas</div></div>
    <div class="kpi"><div class="kl" style="color:var(--red)">Vencidas</div><div class="kv" style="color:${vencidas.length?'var(--red)':'var(--text)'}">${vencidas.length}</div></div>
    <div class="kpi"><div class="kl">Total</div><div class="kv">${minhas.length}</div></div>
  </div>
  ${vencidas.length?`<div style="background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px;margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:8px">⚠ ${vencidas.length} tarefa${vencidas.length!==1?'s':''} vencida${vencidas.length!==1?'s':''}</div>${vencidas.map(card).join('')}</div>`:''}
  <div class="card"><div class="ct">Tarefas abertas (${abertas.length})</div>${abertas.length===0?`<div class="empty">Nenhuma tarefa 🎉</div>`:abertas.filter(t=>!vencidas.find(v=>v.id===t.id)).map(card).join('')}</div>
  ${conc.length?`<div class="card"><div class="ct">Concluídas</div>${conc.slice(0,10).map(card).join('')}</div>`:''} `;
}

// ═══ CHARTS ═══
function destroyCharts(){Object.values(S.charts).forEach(c=>{try{c.destroy();}catch{}});S.charts={};}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;try{S.charts[id]=new Chart(el,cfg);}catch{}}
function initCharts(){
  destroyCharts();
  const at=ativos(filtrados());const fl=S.seg==='ma'?at.filter(d=>d.tipo==='M&A'):S.seg==='dcm'?at.filter(d=>d.tipo==='DCM'):at;
  const lbl={color:'#8899B0',font:{size:10},boxWidth:10};const grid={color:'rgba(255,255,255,0.04)'};
  if(S.page==='dashboard'){
    const byM={};fl.forEach(d=>{byM[d.mandato]=(byM[d.mandato]||0)+(d.deal_value||0);});
    if(Object.keys(byM).length)mkChart('cM',{type:'doughnut',data:{labels:Object.keys(byM),datasets:[{data:Object.values(byM),backgroundColor:PAL,borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{labels:lbl}},responsive:true,maintainAspectRatio:false}});
    const bySt={};S.deals.forEach(d=>{bySt[d.status]=(bySt[d.status]||0)+1;});
    if(Object.keys(bySt).length)mkChart('cS',{type:'doughnut',data:{labels:Object.keys(bySt),datasets:[{data:Object.values(bySt),backgroundColor:Object.keys(bySt).map(k=>SC[k]||'#888'),borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{labels:lbl}},responsive:true,maintainAspectRatio:false}});
    // gráfico de fases separado F1 / F2
    // M&A chart
    const flMA=fl.filter(d=>d.tipo!=='DCM');
    const flDCM=fl.filter(d=>d.tipo==='DCM');
    const f1Names=['Kickoff','Análise','Valuation','Materiais','Buyers','Go-to-mkt'];
    const f2Names=['IO/NBO','Negoc.','LOI/MOU','Due Dilig.','Contratos','Closing'];
    const allNames=[...f1Names,...f2Names];
    const f1Counts=f1Names.map((_,i)=>flMA.filter(d=>{const n=Object.values(d.etapas||{}).filter(v=>v==='done').length;return n===i;}).length);
    const f2Counts=f2Names.map((_,i)=>flMA.filter(d=>{const n=Object.values(d.etapas||{}).filter(v=>v==='done').length;return n===6+i;}).length);
    const allCounts=[...f1Counts,...f2Counts];
    const bgColors=[...f1Names.map(()=>'#0078D4'),...f2Names.map(()=>'#00B4D8')];
    if(flMA.length)mkChart('cFases',{type:'bar',data:{labels:allNames,datasets:[{data:allCounts,backgroundColor:bgColors,borderRadius:6,borderWidth:0,label:'M&A'}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} projeto${c.raw!==1?'s':''}`}}},scales:{x:{ticks:{color:'#8899B0',font:{size:9}},grid},y:{ticks:{color:'#8899B0',font:{size:10},stepSize:1},grid}},responsive:true,maintainAspectRatio:false}});
    // DCM chart
    const dcmNames=FASES_DCM.map(f=>f.n);
    const dcmCounts=FASES_DCM.map((_,i)=>flDCM.filter(d=>{const n=Object.values(d.etapas||{}).filter(v=>v==='done').length;return n===i;}).length);
    if(flDCM.length)mkChart('cFasesDCM',{type:'bar',data:{labels:dcmNames,datasets:[{data:dcmCounts,backgroundColor:'#00B4D8',borderRadius:6,borderWidth:0,label:'DCM'}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} deal${c.raw!==1?'s':''}`}}},scales:{x:{ticks:{color:'#8899B0',font:{size:9}},grid},y:{ticks:{color:'#8899B0',font:{size:10},stepSize:1},grid}},responsive:true,maintainAspectRatio:false}});
  }
}

// ═══ RENDER ═══
function render(){
  const app=document.getElementById('app');
  if(!S.loggedIn){
    app.innerHTML=`<div class="login-wrap"><div class="login-card">
      <div style="text-align:center;margin-bottom:24px">
        <div style="display:flex;justify-content:center;margin-bottom:10px"><div style="width:40px;height:40px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center"><div style="width:14px;height:14px;background:var(--bg2);transform:rotate(45deg)"></div></div></div>
        <div style="font-size:22px;font-weight:700;letter-spacing:3px">APEX</div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:.5px">Investment Banking Platform</div>
      </div>
      <div class="lf"><label>E-mail</label><input type="email" value="${S.loginEmail}" oninput="S.loginEmail=this.value" placeholder="seu@apexpartners.com.br" onkeydown="if(event.key==='Enter')tentarLogin()"/></div>
      <div class="lf"><label>Senha</label><input type="password" value="${S.loginSenha}" oninput="S.loginSenha=this.value" placeholder="••••••••" onkeydown="if(event.key==='Enter')tentarLogin()"/></div>
      <button class="login-btn" onclick="tentarLogin()">Entrar</button>
      ${S.loginErr?`<div class="login-err">${S.loginErr}</div>`:''}
    </div></div>`;return;
  }
  const syncTime=S.lastSync?S.lastSync.toLocaleTimeString('pt-BR'):'—';const u=S.currentUser;
  let content='';
  if(S.loading){content=`<div style="display:flex;align-items:center;justify-content:center;padding:80px;gap:12px;color:var(--text2)"><div class="spinner"></div>Carregando...</div>`;}
  else if(S.detail&&S.detailType==='analista'){content=`<div class="topbar"><div><div class="page-title">Perfil do colaborador</div></div><div style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</div></div>${renderPerfilAnalista(S.detail)}`;}
  else if(S.detail&&S.detailType==='deal'){const d=S.deals.find(x=>x.id===S.detail);content=`<div class="topbar"><div><div class="page-title">Detalhes do projeto</div><div class="page-sub">${d?.cliente||''}</div></div><div style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</div></div>${d?renderDetalhe(d):`<div class="empty">Não encontrado.</div>`}`;}
  else{
    const hasSeg=['dashboard','pipeline'].includes(S.page);
    const topbar=`<div class="topbar"><div><div class="page-title">${TITLES[S.page]||''}</div><div class="page-sub">${SUBS[S.page]||''}</div></div>
    <div class="topbar-right">
      <span style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</span>
      ${hasSeg?`<div class="seg"><button class="seg-btn ${S.seg==='geral'?'active':''}" onclick="S.seg='geral';render()">Geral</button><button class="seg-btn ${S.seg==='ma'?'active':''}" onclick="S.seg='ma';render()">M&A</button><button class="seg-btn ${S.seg==='dcm'?'active':''}" onclick="S.seg='dcm';render()">DCM</button></div>`:''}
      ${hasSeg?`<select class="fsel" onchange="S.filtroColab=this.value;render()"><option value="">Todos os colaboradores</option>${S.usuarios.map(uu=>`<option value="${uu.nome}"${S.filtroColab===uu.nome?' selected':''}>${uu.nome}</option>`).join('')}</select>`:''}
    </div></div>`;
    switch(S.page){
      case'dashboard':content=topbar+renderDash();break;
      case'pipeline':content=topbar+renderPipeline();break;
      case'ma':case'dcm':case'encerrados':content=topbar+renderProjetos();break;
      case'receita':content=topbar+renderReceita();break;
      case'horas':content=topbar+renderHoras();break;
      case'equipe':content=topbar+renderEquipe();break;
      case'tarefas':content=topbar+renderTarefas();break;
    }
  }
  const sidebar=`<div class="sidebar">
    <div class="sidebar-logo"><div class="logo-row"><div class="logo-box"><div class="logo-diamond"></div></div><div><div class="logo-txt">APEX</div><div class="logo-sub">Investment Banking</div></div></div></div>
    ${NAV.map(n=>n.s?`<div class="nav-section">${n.s}</div>`:
    `<div class="nav-item ${S.page===n.k&&!S.detail?'active':''}" onclick="S.page='${n.k}';S.detail=null;S.detailType=null;render()"><span class="nav-icon">${n.i}</span>${n.l}</div>`).join('')}
    <div style="flex:1"></div>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div class="av">${ini(u?.nome||'A')}</div><div><div style="font-size:12px;font-weight:600;color:var(--text)">${u?.nome||'Admin'}</div><div style="font-size:10px;color:var(--text2)">${u?.cargo||''} · ${u?.polo||''}</div></div></div>
      <button class="theme-btn" onclick="toggleTheme()">${S.theme==='dark'?'☀️ Modo claro':'🌙 Modo escuro'}</button>
      <button class="logout-btn" onclick="logout()">↗ Sair</button>
    </div>
  </div>`;
  const modal=S.modal==='deal'?mDeal():S.modal==='user'?mUser():S.modal==='hora'?mHora():S.modal==='recreal'?mRecReal():S.modal==='tarefa'?mTarefa():'';
  app.innerHTML=`<div class="layout">${sidebar}<div class="main">${content}<div class="footer-bar">APEX PARTNERS — DOCUMENTO CONFIDENCIAL</div></div></div>${modal}`;
  if(!S.loading&&!S.detail)setTimeout(initCharts,80);
}

async function init(){
  if(S.loggedIn){await loadAll();}else{render();}
  setInterval(()=>{if(S.loggedIn)loadAll();},60000);
}
init();
</script>
</body>
</html>
