async function saveDeal(data){
  S.saving=true;
  try{
    if(data.id&&!data.id.startsWith('new_')){
      const{error}=await sb.from('deals').update({...data,updated_at:new Date()}).eq('id',data.id);

}

async function importFromSheets(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=Contratos`;
    const res=await fetch(url);const csv=await res.text();
    const rows=parseCSV(csv);if(rows.length<2)return;
    const existing=new Set(S.deals.map(d=>d.arquivo).filter(Boolean));
    const toInsert=[];
    rows.slice(1).forEach((row,idx)=>{
      const g=i=>i<row.length?String(row[i]||'').trim():'';
      const arq=g(0);if(!arq||existing.has(arq))return;

        success_fee:parseN(g(16)),success_fee_min:parseN(g(17)),
        success_fee_base:g(18),deal_value:parseN(g(19)),
        obs:g(23),diretor:g(24),gerente:g(25),analista:g(26),
        setor:g(27),status,status_fat:g(30)||'Pendente',
        tipo:'M&A',polo:'ES',prob:'Alta',etapas:{},fase_atual:0,parcelas:[],
      });
    });
    if(toInsert.length>0){
      const{data:inserted}=await sb.from('deals').insert(toInsert).select();
      if(inserted)S.deals=[...inserted,...S.deals];
    }
  }catch(e){console.error('Sheets import:',e);}
}

function parseCSV(text){
  const rows=[];
  for(const line of text.split('\n')){
    if(!line.trim())continue;
    const row=[];let cell='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cell+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){row.push(cell.trim());cell='';}
      else cell+=c;
    }
    row.push(cell.trim());rows.push(row);
  }
  return rows;
}

  S.editForm={id:'new_deal',source:'local',tipo:'M&A',cliente:'',projeto:'',mandato:'Sell-side',setor:'',status:'Em execução',prob:'Alta',deal_value:'',retainer_f1:'15000',retainer_f2:'7000',success_fee:'3',dia_fat:'30',diretor:'',gerente:'',analista:'',data_assinatura:'',polo:'ES',obs:'',etapas:{},fase_atual:0};
  S.modal='deal';render();
}
function openEditDeal(id){
  const d=S.deals.find(x=>x.id===id);if(!d)return;
  S.editForm={...d,deal_value:String(d.deal_value||''),retainer_f1:String(d.retainer_f1||15000),retainer_f2:String(d.retainer_f2||7000),success_fee:String(d.success_fee||'')};
  S.modal='deal';render();
}
async function handleSaveDeal(){
  const f=S.editForm;if(!f.cliente.trim())return;
  const rec={...f,deal_value:parseN(f.deal_value),retainer_f1:parseN(f.retainer_f1)||15000,retainer_f2:parseN(f.retainer_f2)||7000,success_fee:parseN(f.success_fee)||0};
  S.modal=null;S.editForm=null;
  await saveDeal(rec);render();
}
async function handleDelDeal(id){
  if(!confirm('Excluir este projeto permanentemente?'))return;
  S.detail=null;await deleteDeal(id);render();
}
async function handleSetEtapa(dealId,idx){
  const d=S.deals.find(x=>x.id===dealId);if(!d)return;
  const et={...(d.etapas||{})};
  et[idx]=et[idx]==='done'?'pending':'done';
  const fa=Object.values(et).filter(v=>v==='done').length;
  await updateEtapas(dealId,et,fa);render();
}

function openAddUser(){S.editForm={id:'new_user',nome:'',email:'',senha:'',cargo:'Analista',polo:'ES',area:'M&A',gestor:'',ativo:true};S.modal='user';render();}
function openEditUser(id){const u=S.usuarios.find(x=>x.id===id);if(!u)return;S.editForm={...u};S.modal='user';render();}
async function handleSaveUser(){
  const f=S.editForm;if(!f.nome.trim()||!f.email.trim())return;
  S.modal=null;S.editForm=null;await saveUsuario(f);render();
}
async function handleDelUser(id){if(!confirm('Remover usuário?'))return;await deleteUsuario(id);render();}

function openAddHora(){S.editForm={id:'new_hora',usuario_id:'',deal_id:'',fase:'',etapa:'',horas:'',descricao:'',data:new Date().toISOString().split('T')[0]};S.modal='hora';render();}
async function handleSaveHora(){
  const f=S.editForm;if(!f.horas||!f.deal_id)return;
  S.modal=null;S.editForm=null;await saveHora(f);render();
}
async function handleDelHora(id){await deleteHora(id);render();}

  const totalH=horasD.reduce((s,h)=>s+(h.horas||0),0);
  const equipe=[{r:'Diretor',n:d.diretor},{r:'Gerente',n:d.gerente},{r:'Analista',n:d.analista}].filter(p=>p.n);
  const sf=(d.deal_value||0)*((d.success_fee||0)/100);

    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-ghost" onclick="openEditDeal('${d.id}')">Editar</button>
      <button class="btn-ghost" onclick="S.detail=null;render()">← Voltar</button>
    </div>

    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

      <span style="font-size:10px;font-weight:700;color:var(--blue);background:rgba(0,120,212,.12);padding:3px 10px;border-radius:10px">Fase 1 — Preparation & Marketing</span>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="card-title" style="margin:0">Horas por colaborador</div>
      <button class="btn btn-sm" onclick="openAddHora()">+ Lançar horas</button>
    </div>
    ${horasD.length===0?`<div class="empty">Nenhuma hora registrada.</div>`:`
    <table><thead><tr><th>Colaborador</th><th>Fase</th><th>Etapa</th><th>Horas</th><th>Data</th><th>Descrição</th><th></th></tr></thead>
    <tbody>${horasD.map(h=>{
      const u=S.usuarios.find(x=>x.id===h.usuario_id);
      return`<tr><td style="font-weight:600">${u?u.nome:'—'}</td><td style="color:var(--text2)">${h.fase||'—'}</td><td style="color:var(--text2)">${h.etapa||'—'}</td><td style="font-weight:600;color:var(--blue)">${h.horas}h</td><td style="color:var(--text2)">${h.data||'—'}</td><td style="color:var(--text2);font-size:11px">${h.descricao||''}</td><td><button class="btn-danger btn-sm" onclick="handleDelHora('${h.id}')">✕</button></td></tr>`;
    }).join('')}</tbody></table>`}
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
    <button class="btn-danger" onclick="handleDelDeal('${d.id}')">Excluir projeto</button>
  </div>`;
}

function renderDashboard(){
  const ativos=S.deals.filter(d=>d.status!=='Concluído'&&d.status!=='Congelado');
  const filtr=S.seg==='ma'?ativos.filter(d=>d.tipo==='M&A'):S.seg==='dcm'?ativos.filter(d=>d.tipo==='DCM'):ativos;
  const totalDV=filtr.reduce((s,d)=>s+(d.deal_value||0),0);
  const totalRet=filtr.reduce((s,d)=>s+(d.retainer_f2||0),0);
  const totalSF=filtr.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  const recPond=filtr.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100)*({Alta:.8,Média:.5,Baixa:.2}[d.prob]||.5),0);
  const totalH=S.horas.reduce((s,h)=>s+(h.horas||0),0);
  const byMandato={};filtr.forEach(d=>{byMandato[d.mandato]=(byMandato[d.mandato]||0)+(d.deal_value||0);});
  const byStatus={};S.deals.forEach(d=>{byStatus[d.status]=(byStatus[d.status]||0)+1;});
  const byPolo={ES:0,SC:0,Ambos:0};filtr.forEach(d=>{if(byPolo[d.polo]!==undefined)byPolo[d.polo]++;});
  return`
  <div class="kpis kpis-5">
    <div class="kpi accent"><div class="kpi-label">Projetos ativos</div><div class="kpi-value">${filtr.length}</div><div class="kpi-sub">${S.deals.filter(d=>d.status==='Concluído').length} concluído(s)</div></div>
    <div class="kpi"><div class="kpi-label">Deal value</div><div class="kpi-value">${fmt(totalDV)}</div></div>
    <div class="kpi"><div class="kpi-label">SF potencial</div><div class="kpi-value">${fmt(totalSF)}</div></div>
    <div class="kpi accent2"><div class="kpi-label">Receita ponderada</div><div class="kpi-value">${fmt(recPond)}</div><div class="kpi-sub">Por probabilidade</div></div>
    <div class="kpi"><div class="kpi-label">MRR retainers</div><div class="kpi-value">${fmt(totalRet)}</div><div class="kpi-sub">${totalH.toFixed(0)}h registradas</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Deal value por mandato</div><div class="chart-wrap"><canvas id="cMandato"></canvas></div></div>
    <div class="card"><div class="card-title">Status dos projetos</div><div class="chart-wrap"><canvas id="cStatus"></canvas></div></div>
  </div>
  <div class="grid3">
    <div class="card"><div class="card-title">Por polo</div>${Object.entries(byPolo).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">${ptag(k)}<span style="font-weight:600">${v}</span></div>`).join('')}</div>
    <div class="card"><div class="card-title">Projetos recentes</div>${filtr.slice(0,4).map(d=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:12px;font-weight:600">${d.cliente}</div><div style="font-size:10px;color:var(--text2)">${d.mandato}</div></div>${badge(d.status,STATUS_C[d.status]||'#888')}</div>`).join('')||`<div class="empty" style="padding:16px">Sem projetos</div>`}</div>
    <div class="card"><div class="card-title">Por probabilidade</div>${['Alta','Média','Baixa'].map(p=>{const n=filtr.filter(d=>d.prob===p).length;const pct=filtr.length?Math.round(n/filtr.length*100):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:${PROB_C[p]}">${p}</span><span>${n} (${pct}%)</span></div><div style="height:5px;background:var(--bg3);border-radius:3px"><div style="height:5px;background:${PROB_C[p]};border-radius:3px;width:${pct}%"></div></div></div>`;}).join('')}</div>
  </div>`;
}

function renderPipeline(){
  const ativos=S.deals.filter(d=>d.status!=='Concluído'&&d.status!=='Congelado');
  const fases=['Preparação','Abordagem','Negociação','Due Diligence','Contratos','Closing'];
  const mapa={};fases.forEach(f=>mapa[f]=[]);
  ativos.forEach(d=>{
    const n=Object.values(d.etapas||{}).filter(v=>v==='done').length;
    let fase=fases[0];
    if(n>=10)fase=fases[5];else if(n>=8)fase=fases[4];else if(n>=6)fase=fases[3];else if(n>=4)fase=fases[2];else if(n>=2)fase=fases[1];
    mapa[fase].push(d);
  });
  const totalDV=ativos.reduce((s,d)=>s+(d.deal_value||0),0);
  const totalSF=ativos.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  return`
  <div class="kpis kpis-3">
    <div class="kpi accent"><div class="kpi-label">Pipeline total</div><div class="kpi-value">${fmt(totalDV)}</div></div>
    <div class="kpi"><div class="kpi-label">SF potencial</div><div class="kpi-value">${fmt(totalSF)}</div></div>
    <div class="kpi"><div class="kpi-label">Deals ativos</div><div class="kpi-value">${ativos.length}</div></div>
  </div>
  <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px">
    ${fases.map(f=>`<div class="pipe-col">
      <div class="pipe-header">${f} <span style="margin-left:4px;font-size:9px;opacity:.7">${mapa[f].length}</span></div>
      <div class="pipe-body">
        ${mapa[f].length===0?`<div style="font-size:11px;color:var(--text2);text-align:center;padding:12px">—</div>`:
        mapa[f].map(d=>`<div class="pipe-card" onclick="S.detail='${d.id}';render()">
          <div style="font-size:12px;font-weight:600;margin-bottom:3px">${d.cliente}</div>
          <div style="font-size:10px;color:var(--text2)">${fmt(d.deal_value||0)} · ${d.success_fee||0}%</div>
          <div style="margin-top:5px">${badge(d.prob||'—',PROB_C[d.prob]||'#888')}</div>
        </div>`).join('')}
      </div>
    </div>`).join('')}
  </div>`;
}

function renderProjetos(){
  const tipo=S.page==='ma'?'M&A':S.page==='dcm'?'DCM':null;
  const list=S.page==='encerrados'?S.deals.filter(d=>d.status==='Concluído'||d.status==='Congelado'):tipo?S.deals.filter(d=>d.tipo===tipo&&d.status!=='Concluído'&&d.status!=='Congelado'):S.deals;
  return`
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px">${S.page!=='encerrados'?`<button class="btn" onclick="openAddDeal()">+ Novo projeto</button>`:''}</div>
  <div class="card" style="margin-bottom:0">
    ${list.length===0?`<div class="empty">Nenhum projeto encontrado.</div>`:`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Cliente</th><th>Projeto</th><th>Mandato</th><th>Status</th><th>Prob.</th><th>Polo</th><th>Deal value</th><th>Retainer</th><th>Progresso</th><th>Equipe</th><th></th></tr></thead>
      <tbody>${list.map(d=>{
        const total=FASES_MA.length;
        const feitas=Object.values(d.etapas||{}).filter(v=>v==='done').length;
        const pct=Math.round(feitas/total*100);
        return`<tr>
          <td><div style="font-weight:600">${d.cliente}</div><div style="font-size:10px;color:var(--text2)">${d.setor||''}</div></td>
          <td style="color:var(--text2)">${d.projeto||'—'}</td>
          <td>${badge(d.mandato,MAND_C[d.mandato]||'#888')}</td>
          <td>${badge(d.status,STATUS_C[d.status]||'#888')}</td>
          <td>${badge(d.prob||'—',PROB_C[d.prob]||'#888')}</td>
          <td>${ptag(d.polo)}</td>
          <td style="font-weight:600">${fmt(d.deal_value)}</td>
          <td>${fmt(d.retainer_f2)}/mês</td>
          <td><div style="min-width:80px"><div style="font-size:10px;color:var(--text2);margin-bottom:3px">${pct}%</div><div style="height:4px;background:var(--bg3);border-radius:2px"><div style="height:4px;background:var(--blue);border-radius:2px;width:${pct}%"></div></div></div></td>
          <td style="font-size:11px;color:${d.diretor?'var(--text)':'var(--red)'}">${d.diretor||'Não definida'}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-sm" onclick="S.detail='${d.id}';render()" style="margin-right:4px">Ver</button>
            <button class="btn-ghost btn-sm" onclick="openEditDeal('${d.id}')" style="margin-right:4px">Editar</button>
            <button class="btn-danger btn-sm" onclick="handleDelDeal('${d.id}')">✕</button>
          </td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>`}
  </div>`;
}

function renderEquipe(){
  return`
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn" onclick="openAddUser()">+ Novo usuário</button></div>
  <div class="card">
    ${S.usuarios.length===0?`<div class="empty">Nenhum usuário cadastrado.</div>`:`
    <table><thead><tr><th>Nome</th><th>Cargo</th><th>Polo</th><th>Área</th><th>Gestor</th><th>Projetos</th><th>Horas</th><th>Status</th><th></th></tr></thead>
    <tbody>${S.usuarios.map(u=>{
      const proj=S.deals.filter(d=>d.diretor===u.nome||d.gerente===u.nome||d.analista===u.nome).length;
      const hrs=S.horas.filter(h=>h.usuario_id===u.id).reduce((s,h)=>s+(h.horas||0),0);
      return`<tr>
        <td><div style="display:flex;align-items:center;gap:8px"><div class="av" style="width:28px;height:28px;font-size:10px">${ini(u.nome)}</div><span style="font-weight:600">${u.nome}</span></div></td>
        <td style="color:var(--text2)">${u.cargo}</td>
        <td>${ptag(u.polo)}</td>
        <td style="color:var(--text2)">${u.area||'—'}</td>
        <td style="color:var(--text2)">${u.gestor||'—'}</td>
        <td style="font-weight:600">${proj}</td>
        <td style="font-weight:600;color:var(--blue)">${hrs.toFixed(1)}h</td>
        <td>${badge(u.ativo!==false?'Ativo':'Inativo',u.ativo!==false?'#22C55E':'#EF4444')}</td>
        <td style="white-space:nowrap">
          <button class="btn-ghost btn-sm" onclick="openEditUser('${u.id}')" style="margin-right:4px">Editar</button>
          <button class="btn-danger btn-sm" onclick="handleDelUser('${u.id}')">✕</button>
        </td>
      </tr>`;}).join('')}
    </tbody></table>`}
  </div>`;
}

function renderReceita(){
  const ativos=S.deals.filter(d=>d.status!=='Concluído'&&d.status!=='Congelado');
  const totalRet=ativos.reduce((s,d)=>s+(d.retainer_f2||0),0);
  const totalSF=ativos.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);
  const sorted=[...ativos].sort((a,b)=>(b.retainer_f2||0)-(a.retainer_f2||0));
  return`
  <div class="kpis">
    <div class="kpi accent"><div class="kpi-label">MRR retainers</div><div class="kpi-value">${fmt(totalRet)}</div><div class="kpi-sub">Recorrente mensal</div></div>
    <div class="kpi"><div class="kpi-label">ARR projetado</div><div class="kpi-value">${fmt(totalRet*12)}</div></div>
    <div class="kpi"><div class="kpi-label">SF potencial</div><div class="kpi-value">${fmt(totalSF)}</div></div>
    <div class="kpi"><div class="kpi-label">Fee médio</div><div class="kpi-value">${ativos.length?(ativos.reduce((s,d)=>s+(d.success_fee||0),0)/ativos.length).toFixed(1)+'%':'—'}</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Retainer por cliente</div><div class="chart-wrap"><canvas id="cRet"></canvas></div></div>
    <div class="card"><div class="card-title">Success fee potencial</div>
      ${[...S.deals].sort((a,b)=>(b.deal_value||0)*(b.success_fee||0)/100-(a.deal_value||0)*(a.success_fee||0)/100).slice(0,8).map((d,i,a)=>{
        const sf=(d.deal_value||0)*((d.success_fee||0)/100);
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:${i<a.length-1?'1px solid var(--border)':'none'}">
          <div><div style="font-size:12px;font-weight:600">${d.cliente}</div><div style="font-size:10px;color:var(--text2)">${d.success_fee||0}% · ${d.mandato}</div></div>
          <div style="text-align:right"><div style="font-size:13px;font-weight:700;color:var(--cyan)">${fmt(sf)}</div>${badge(d.prob||'—',PROB_C[d.prob]||'#888')}</div>
        </div>`;}).join('')||`<div class="empty">Sem dados</div>`}
    </div>
  </div>`;
}

function renderHoras(){
  const totalH=S.horas.reduce((s,h)=>s+(h.horas||0),0);
  const byUser={};S.horas.forEach(h=>{byUser[h.usuario_id]=(byUser[h.usuario_id]||0)+(h.horas||0);});
  const byDeal={};S.horas.forEach(h=>{byDeal[h.deal_id]=(byDeal[h.deal_id]||0)+(h.horas||0);});
  return`
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn" onclick="openAddHora()">+ Lançar horas</button></div>
  <div class="kpis kpis-3">
    <div class="kpi accent"><div class="kpi-label">Total de horas</div><div class="kpi-value">${totalH.toFixed(1)}h</div></div>
    <div class="kpi"><div class="kpi-label">Colaboradores</div><div class="kpi-value">${Object.keys(byUser).length}</div></div>
    <div class="kpi"><div class="kpi-label">Projetos com horas</div><div class="kpi-value">${Object.keys(byDeal).length}</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Horas por colaborador</div>
      ${Object.entries(byUser).map(([uid,h])=>{const u=S.usuarios.find(x=>x.id===uid);const pct=totalH?Math.round(h/totalH*100):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600">${u?u.nome:uid}</span><span style="color:var(--blue)">${h.toFixed(1)}h</span></div><div style="height:5px;background:var(--bg3);border-radius:3px"><div style="height:5px;background:var(--blue);border-radius:3px;width:${pct}%"></div></div></div>`;}).join('')||`<div class="empty">Sem registros</div>`}
    </div>
    <div class="card"><div class="card-title">Horas por projeto</div>
      ${Object.entries(byDeal).map(([did,h])=>{const d=S.deals.find(x=>x.id===did);const pct=totalH?Math.round(h/totalH*100):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600">${d?d.cliente:did}</span><span style="color:var(--blue)">${h.toFixed(1)}h</span></div><div style="height:5px;background:var(--bg3);border-radius:3px"><div style="height:5px;background:var(--cyan);border-radius:3px;width:${pct}%"></div></div></div>`;}).join('')||`<div class="empty">Sem registros</div>`}
    </div>
  </div>
  <div class="card"><div class="card-title">Lançamentos recentes</div>
    ${S.horas.length===0?`<div class="empty">Nenhuma hora lançada.</div>`:`
    <table><thead><tr><th>Colaborador</th><th>Projeto</th><th>Fase</th><th>Horas</th><th>Data</th><th>Descrição</th><th></th></tr></thead>
    <tbody>${S.horas.slice(0,20).map(h=>{
      const u=S.usuarios.find(x=>x.id===h.usuario_id);
      const d=S.deals.find(x=>x.id===h.deal_id);
      return`<tr><td style="font-weight:600">${u?u.nome:'—'}</td><td style="color:var(--text2)">${d?d.cliente:'—'}</td><td style="color:var(--text2)">${h.fase||'—'}</td><td style="font-weight:600;color:var(--blue)">${h.horas}h</td><td style="color:var(--text2)">${h.data||'—'}</td><td style="color:var(--text2);font-size:11px">${h.descricao||''}</td><td><button class="btn-danger btn-sm" onclick="handleDelHora('${h.id}')">✕</button></td></tr>`;
    }).join('')}</tbody></table>`}
  </div>`;
}

// ═══ CHARTS ═══
function destroyCharts(){Object.values(S.charts).forEach(c=>{try{c.destroy();}catch{}});S.charts={};}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;try{S.charts[id]=new Chart(el,cfg);}catch{}}
function initCharts(){
  destroyCharts();
  const ativos=S.deals.filter(d=>d.status!=='Concluído'&&d.status!=='Congelado');
  const filtr=S.seg==='ma'?ativos.filter(d=>d.tipo==='M&A'):S.seg==='dcm'?ativos.filter(d=>d.tipo==='DCM'):ativos;
  const lbl={color:'#8899B0',font:{size:10},boxWidth:10};
  const grid={color:'rgba(255,255,255,0.04)'};
  if(S.page==='dashboard'){
    const byM={};filtr.forEach(d=>{byM[d.mandato]=(byM[d.mandato]||0)+(d.deal_value||0);});
    if(Object.keys(byM).length)mkChart('cMandato',{type:'doughnut',data:{labels:Object.keys(byM),datasets:[{data:Object.values(byM),backgroundColor:PALETTE,borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{labels:lbl}},responsive:true,maintainAspectRatio:false}});
    const byS={};S.deals.forEach(d=>{byS[d.status]=(byS[d.status]||0)+1;});
    if(Object.keys(byS).length)mkChart('cStatus',{type:'doughnut',data:{labels:Object.keys(byS),datasets:[{data:Object.values(byS),backgroundColor:Object.keys(byS).map(k=>STATUS_C[k]||'#888'),borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{labels:lbl}},responsive:true,maintainAspectRatio:false}});
  }
  if(S.page==='receita'){
    const sorted=[...ativos].sort((a,b)=>(b.retainer_f2||0)-(a.retainer_f2||0));
    if(sorted.length)mkChart('cRet',{type:'bar',data:{labels:sorted.map(d=>d.cliente.split(' ')[0]),datasets:[{data:sorted.map(d=>d.retainer_f2||0),backgroundColor:'#0078D4',borderRadius:5,borderWidth:0,label:'Retainer/mês'}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8899B0',font:{size:10}},grid},y:{ticks:{color:'#8899B0',font:{size:10},callback:v=>v>=1e3?`${(v/1e3).toFixed(0)}K`:v},grid}},responsive:true,maintainAspectRatio:false}});
  }
}

// ═══ RENDER ═══
function render(){
  const app=document.getElementById('app');
  const syncTime=S.lastSync?S.lastSync.toLocaleTimeString('pt-BR'):'—';

  let content='';
  if(S.loading){
    content=`<div style="display:flex;align-items:center;justify-content:center;padding:80px;gap:12px;color:var(--text2)"><div class="spinner"></div>Carregando dados do Supabase...</div>`;
  } else if(S.detail){
    const d=S.deals.find(x=>x.id===S.detail);
    content=`<div class="topbar"><div><div class="page-title">Detalhes do projeto</div><div class="page-sub">${d?.cliente||''}</div></div><div style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>Supabase conectado</div></div>${d?renderDetalhe(d):`<div class="empty">Não encontrado.</div>`}`;
  } else {
    const hasSeg=['dashboard','pipeline'].includes(S.page);
    const topbar=`<div class="topbar">
      <div><div class="page-title">${TITLES[S.page]||''}</div><div class="page-sub">${SUBS[S.page]||''}</div></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</div>
        ${hasSeg?`<div class="seg"><button class="seg-btn ${S.seg==='geral'?'active':''}" onclick="S.seg='geral';render()">Geral</button><button class="seg-btn ${S.seg==='ma'?'active':''}" onclick="S.seg='ma';render()">M&A</button><button class="seg-btn ${S.seg==='dcm'?'active':''}" onclick="S.seg='dcm';render()">DCM</button></div>`:''}
      </div>
    </div>`;
    switch(S.page){
      case'dashboard':content=topbar+renderDashboard();break;
      case'pipeline':content=topbar+renderPipeline();break;
      case'ma':case'dcm':case'encerrados':content=topbar+renderProjetos();break;
      case'receita':content=topbar+renderReceita();break;
      case'horas':content=topbar+renderHoras();break;
      case'equipe':content=topbar+renderEquipe();break;
    }
  }

  const u=S.currentUser;
  const sidebar=`<div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-row"><div class="logo-box"><div class="logo-diamond"></div></div><div><div class="logo-txt">APEX</div><div class="logo-sub">Investment Banking</div></div></div>
    </div>
    ${NAV.map(n=>n.sec?`<div class="nav-section">${n.sec}</div>`:
    `<div class="nav-item ${S.page===n.key&&!S.detail?'active':''}" onclick="S.page='${n.key}';S.detail=null;render()"><span class="nav-icon">${n.icon}</span>${n.label}</div>`).join('')}
    <div style="flex:1"></div>
    <div class="sidebar-footer">
      <div class="user-chip"><div class="av">${ini(u?.nome||'A')}</div><div><div style="font-size:12px;font-weight:600;color:var(--text)">${u?.nome||'Admin'}</div><div style="font-size:10px;color:var(--text2)">${u?.cargo||''}</div></div></div>
      <button class="theme-btn" onclick="toggleTheme()">${S.theme==='dark'?'☀️ Modo claro':'🌙 Modo escuro'}</button>
    </div>
  </div>`;

  const modal=S.modal==='deal'?renderDealModal():S.modal==='user'?renderUserModal():S.modal==='hora'?renderHoraModal():'';
  app.innerHTML=`<div class="layout">${sidebar}<div class="main">${content}<div class="footer-bar">APEX PARTNERS — DOCUMENTO CONFIDENCIAL</div></div></div>${modal}`;
  if(!S.loading&&!S.detail)setTimeout(initCharts,80);
}

// ═══ INIT ═══
async function init(){
  await loadAll();
  await importFromSheets();
  render();
  setInterval(loadAll,SYNC_MS);
}
init();
</script>
</body>
</html>
