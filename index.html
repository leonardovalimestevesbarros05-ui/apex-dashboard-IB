<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex Partners — Investment Banking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A1628;--bg2:#111D32;--bg3:#162240;--bg4:#1C2B4A;--blue:#0078D4;--cyan:#00B4D8;--white:#FFFFFF;--gray:#8899B0;--border:rgba(255,255,255,0.07);--green:#22C55E;--amber:#F59E0B;--red:#EF4444;--purple:#A78BFA}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--white);font-size:13px}
.layout{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:0 16px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.logo-row{display:flex;align-items:center;gap:8px}
.logo-box{width:26px;height:26px;background:var(--blue);border-radius:5px;display:flex;align-items:center;justify-content:center}
.logo-diamond{width:9px;height:9px;background:var(--bg);transform:rotate(45deg)}
.logo-txt{font-size:17px;font-weight:700;letter-spacing:2.5px}
.logo-sub{font-size:10px;color:var(--gray);margin-top:4px;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--gray);font-size:12px;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--white);background:var(--bg3)}
.nav-item.active{color:var(--white);border-left-color:var(--blue);background:var(--bg3);font-weight:600}
.nav-icon{font-size:14px;width:18px;text-align:center}
.main{flex:1;overflow-y:auto;padding:24px;margin-left:210px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.page-title{font-size:21px;font-weight:700}
.page-sub{font-size:12px;color:var(--gray);margin-top:3px}
.seg{display:flex;gap:3px;background:var(--bg2);border-radius:8px;padding:3px;border:1px solid var(--border)}
.seg-btn{padding:5px 14px;font-size:11px;background:transparent;color:var(--gray);border:none;border-radius:6px;cursor:pointer;transition:all .15s;font-family:inherit}
.seg-btn.active{background:var(--blue);color:#fff;font-weight:600}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border-radius:12px;padding:16px 18px;border:1px solid var(--border)}
.kpi.accent{background:linear-gradient(135deg,#0078D4,#0052A3);border:none}
.kpi-label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi.accent .kpi-label{color:rgba(255,255,255,0.6)}
.kpi-value{font-size:22px;font-weight:700;line-height:1.1}
.kpi-sub{font-size:10px;color:var(--gray);margin-top:4px}
.kpi.accent .kpi-sub{color:rgba(255,255,255,0.5)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:var(--bg2);border-radius:12px;padding:18px;border:1px solid var(--border);margin-bottom:14px}
.card-title{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.bar-row{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.bar-track{height:6px;background:var(--bg3);border-radius:3px}
.bar-fill{height:6px;border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 8px;font-weight:600;color:var(--gray);font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border)}
td{padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.btn{background:var(--blue);border:none;color:#fff;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
.btn:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--gray);border-radius:7px;padding:5px 12px;cursor:pointer;font-size:11px;font-family:inherit}
.btn-ghost:hover{color:var(--white)}
.btn-danger{background:transparent;border:1px solid rgba(239,68,68,0.35);color:var(--red);border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:inherit}
.btn-danger:hover{background:rgba(239,68,68,0.1)}
.btn-success{background:transparent;border:1px solid rgba(34,197,94,0.35);color:var(--green);border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:inherit}
.btn-amber{background:transparent;border:1px solid rgba(245,158,11,0.35);color:var(--amber);border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:inherit}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--bg2);border-radius:16px;padding:24px;border:1px solid var(--border);width:92%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:.8px}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:#fff;font-size:12px;font-family:inherit;outline:none;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg select option{background:var(--bg)}
.fg textarea{resize:vertical;min-height:60px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.footer-bar{text-align:center;margin-top:20px;padding-top:14px;border-top:1px solid var(--border);font-size:10px;color:var(--gray);letter-spacing:2px}
.empty{text-align:center;padding:40px;color:var(--gray)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.retainer-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;margin-bottom:6px;background:var(--bg3)}
.retainer-row.pago{border-left:3px solid var(--green)}
.retainer-row.pendente{border-left:3px solid var(--amber)}
.retainer-row.futuro{border-left:3px solid var(--bg4);opacity:.6}
.fase-tag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.confirm-box{background:var(--bg3);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:16px;margin-bottom:14px}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>
<script>
const SHEET_ID='1va3HsPbT4Ac_50VTKvTsCNSLD4OMHpZaQBakDw0sdDM';
const SHEET_NAME='Contratos';
const API_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
const INTERVALO=30000;

const STATUS_C={'Em execução':'#22C55E','Proposta enviada':'#F59E0B','Em negociação':'#3BA0E6','Concluído':'#64748B','Em estruturação':'#A78BFA','Congelado':'#EF4444','Ativo':'#22C55E'};
const MAND_C={'Sell-side':'#0078D4','sell-side':'#0078D4','Buy-side':'#00B4D8','buy-side':'#00B4D8','Captação':'#22C55E','captacao':'#22C55E','Reestruturação':'#F59E0B','outro':'#8899B0'};
const NAV=[{key:'dashboard',label:'Dashboard',icon:'⬡'},{key:'receita',label:'Receita',icon:'◆'},{key:'projetos-ma',label:'Projetos M&A',icon:'◈'},{key:'projetos-dcm',label:'Projetos DCM',icon:'◈'},{key:'encerrados',label:'Encerrados / Congelados',icon:'◌'},{key:'equipe',label:'Equipe',icon:'◎'}];
const badge=(t,c)=>`<span class="badge" style="background:${c||'#888'}22;color:${c||'#888'}">${t||''}</span>`;
const ini=n=>n?n.trim().split(' ').filter(Boolean).slice(0,2).map(x=>x[0].toUpperCase()).join(''):'?';

// Converte qualquer formato de data para DD/MM/AAAA
function fmtDate(v){
  if(!v||v==='')return'—';
  const s=String(v);
  // Formato Date(YYYY,M,D)
  const m=s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if(m){
    const y=m[1],mo=String(parseInt(m[2])+1).padStart(2,'0'),d=String(m[3]).padStart(2,'0');
    return`${d}/${mo}/${y}`;
  }
  // Formato YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){
    const[y,mo,d]=s.split('T')[0].split('-');
    return`${d}/${mo}/${y}`;
  }
  // Formato DD/MM/AAAA já ok
  if(/^\d{2}\/\d{2}\/\d{4}/.test(s)) return s;
  return s;
}

function fmtDateToObj(v){
  if(!v||v==='')return null;
  const s=String(v);
  const m=s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if(m) return new Date(parseInt(m[1]),parseInt(m[2]),parseInt(m[3]));
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s.split('T')[0]);
  if(/^\d{2}\/\d{2}\/\d{4}/.test(s)){const[d,mo,y]=s.split('/');return new Date(y,mo-1,d);}
  return null;
}

const fmtBRL=v=>{if(!v||isNaN(v))return'N/A';v=parseFloat(v);if(v>=1e9)return`R$ ${(v/1e9).toFixed(1)}B`;if(v>=1e6)return`R$ ${(v/1e6).toFixed(1)}M`;if(v>=1e3)return`R$ ${(v/1e3).toFixed(0)}K`;return`R$ ${v.toLocaleString('pt-BR')}`;};

let S={page:'dashboard',seg:'consolidado',modal:null,detail:null,editForm:null,nextId:1000,deals:[],sheetsDeals:[],loading:true,lastSync:null,localEdits:{}};

async function fetchSheets(){
  try{
    const res=await fetch(API_URL);
    const text=await res.text();
    const json=JSON.parse(text.replace(/^.*?({.*}).*$/s,'$1'));
    const rows=json.table.rows;
    const deals=[];
    rows.forEach((row,idx)=>{
      if(!row.c||!row.c[0]||!row.c[0].v)return;
      const get=i=>(row.c[i]&&row.c[i].v!==null)?String(row.c[i].v):'';
      const status=get(29)||'Ativo';
      if(status==='ERRO NA EXTRACAO')return;
      const retStr=get(13).replace(/[R$\s.]/g,'').replace(',','.');
      const dvStr=get(19).replace(/[R$\s.]/g,'').replace(',','.');
      const sfStr=get(16).replace(/[%\s]/g,'').replace(',','.');
      const id='sheet_'+idx;
      const local=S.localEdits[id]||{};
      deals.push({
        id,source:'sheet',
        arquivo:get(0),dataExtracao:get(1),
        cliente:get(2)||get(0),cnpj:get(3),contato:get(4),email:get(5),
        projeto:get(6)||get(0),mandato:get(7)||'outro',descricao:get(8),
        dataAssinatura:get(9),dataInicio:get(10),dataTermino:get(11),prazoMeses:get(12),
        retainer:parseFloat(retStr)||0,retainerMoeda:get(14)||'BRL',retainerPgto:get(15),
        successFee:parseFloat(sfStr)||0,successFeeFixo:get(17),successFeeBase:get(18),
        dealValue:parseFloat(dvStr)||0,dealValueMoeda:get(20)||'BRL',
        diaFat:get(21),condPgto:get(22),obs:get(23),
        diretor:get(24),gerente:get(25),analista:get(26),
        setor:get(27),tamanho:get(28),
        status,statusFat:get(30),tipo:'M&A',
        // Campos extras do contrato (fase 1, fase 2)
        retainerFase1:local.retainerFase1||'',
        retainerFase2:local.retainerFase2||get(13),
        parcelas:local.parcelas||[],
        ...local
      });
    });
    S.sheetsDeals=deals;
    S.deals=[...deals,...Object.values(S.localEdits).filter(d=>d.source==='local')];
    S.lastSync=new Date();S.loading=false;render();
  }catch(e){console.error(e);S.loading=false;render();}
}

function openAdd(){S.editForm={id:null,source:'local',tipo:'M&A',cliente:'',projeto:'',mandato:'Sell-side',setor:'',status:'Em execução',dealValue:'',retainer:'',retainerFase1:'',retainerFase2:'',successFee:'',diaFat:'',diretor:'',gerente:'',analista:'',dataAssinatura:'',dataInicio:'',obs:''};S.modal='form';render();}
function openEdit(id){const d=S.deals.find(x=>x.id===id);if(!d)return;S.editForm={...d,dealValue:String(d.dealValue||''),retainer:String(d.retainer||''),successFee:String(d.successFee||''),retainerFase1:d.retainerFase1||'',retainerFase2:d.retainerFase2||String(d.retainer||'')};S.modal='form';render();}
function openEditEquipe(id){const d=S.deals.find(x=>x.id===id);if(!d)return;S.editForm={...d,_modeEquipe:true};S.modal='equipeForm';render();}
function uf(k,v){S.editForm[k]=v;}

function saveForm(){
  const f=S.editForm;if(!f.cliente.trim())return;
  const rec={...f,dealValue:parseFloat(f.dealValue)||0,retainer:parseFloat(f.retainerFase2||f.retainer)||0,successFee:parseFloat(f.successFee)||0};
  if(f.source==='sheet'){S.localEdits[f.id]={...S.localEdits[f.id],...rec};}
  else{if(!rec.id){rec.id='local_'+S.nextId++;}S.localEdits[rec.id]=rec;}
  S.deals=S.deals.map(d=>d.id===rec.id?{...d,...rec}:d);
  if(!S.deals.find(d=>d.id===rec.id))S.deals.push(rec);
  S.modal=null;S.editForm=null;render();
}

function saveEquipe(){
  const f=S.editForm;
  S.localEdits[f.id]={...S.localEdits[f.id],diretor:f.diretor,gerente:f.gerente,analista:f.analista};
  S.deals=S.deals.map(d=>d.id===f.id?{...d,diretor:f.diretor,gerente:f.gerente,analista:f.analista}:d);
  S.modal=null;S.editForm=null;render();
}

function del(id){
  if(!confirm('Excluir este projeto da visualização?'))return;
  delete S.localEdits[id];
  S.deals=S.deals.filter(x=>x.id!==id);
  S.sheetsDeals=S.sheetsDeals.filter(x=>x.id!==id);
  S.detail=null;render();
}

function marcarRetainerPago(dealId,mes){
  const d=S.deals.find(x=>x.id===dealId);if(!d)return;
  const parcelas=d.parcelas||[];
  const idx=parcelas.findIndex(p=>p.mes===mes);
  if(idx>=0)parcelas[idx].status=parcelas[idx].status==='pago'?'pendente':'pago';
  else parcelas.push({mes,status:'pago'});
  S.localEdits[dealId]={...S.localEdits[dealId],parcelas:[...parcelas]};
  S.deals=S.deals.map(x=>x.id===dealId?{...x,parcelas:[...parcelas]}:x);
  render();
}

function confirmarEnvio(id){
  if(!confirm('Confirmar que o e-mail de cobrança foi enviado ao cliente?'))return;
  S.localEdits[id]={...S.localEdits[id],statusFat:'Faturado',dataEnvio:new Date().toLocaleDateString('pt-BR')};
  S.deals=S.deals.map(d=>d.id===id?{...d,statusFat:'Faturado',dataEnvio:new Date().toLocaleDateString('pt-BR')}:d);
  render();
}

// Gera parcelas de retainer com base na data de assinatura
function gerarParcelas(deal){
  const parcelas=[];
  const dataBase=fmtDateToObj(deal.dataAssinatura);
  if(!dataBase)return parcelas;
  const salvas=deal.parcelas||[];
  const getStatus=mes=>{const s=salvas.find(p=>p.mes===mes);return s?s.status:'pendente';};
  const hoje=new Date();

  // Fase 1 — 2 parcelas fixas de R$15k (se existir)
  const r1=parseFloat(deal.retainerFase1)||15000;
  const r2=parseFloat(deal.retainerFase2)||deal.retainer||7000;

  // Parcela 1 — na assinatura
  const d1=new Date(dataBase);
  const mes1=`${String(d1.getMonth()+1).padStart(2,'0')}/${d1.getFullYear()}`;
  parcelas.push({mes:mes1,data:d1.toLocaleDateString('pt-BR'),valor:r1,fase:'Fase 1',desc:'Parcela 1 — assinatura',status:d1<hoje?getStatus(mes1):'futuro'});

  // Parcela 2 — 30 dias depois
  const d2=new Date(dataBase);d2.setDate(d2.getDate()+30);
  const mes2=`${String(d2.getMonth()+1).padStart(2,'0')}/${d2.getFullYear()}`;
  parcelas.push({mes:mes2,data:d2.toLocaleDateString('pt-BR'),valor:r1,fase:'Fase 1',desc:'Parcela 2 — fim Fase 1',status:d2<hoje?getStatus(mes2):'futuro'});

  // Fase 2 — mensais a partir de 30 dias da parcela 2
  const inicio2=new Date(d2);inicio2.setDate(inicio2.getDate()+30);
  for(let i=0;i<24;i++){
    const dt=new Date(inicio2);dt.setMonth(dt.getMonth()+i);
    if(dt>new Date(hoje.getFullYear(),hoje.getMonth()+6,1))break;
    const mes=`${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
    const st=dt<hoje?getStatus(mes):(dt.getMonth()===hoje.getMonth()&&dt.getFullYear()===hoje.getFullYear()?getStatus(mes):'futuro');
    parcelas.push({mes,data:dt.toLocaleDateString('pt-BR'),valor:r2,fase:'Fase 2',desc:`Retainer mensal — ${mes}`,status:st});
  }
  return parcelas;
}

function filtered(){
  const ds=S.deals;
  if(S.page==='projetos-ma')return ds.filter(d=>d.tipo==='M&A'&&d.status!=='Concluído'&&d.status!=='Congelado');
  if(S.page==='projetos-dcm')return ds.filter(d=>d.tipo==='DCM'&&d.status!=='Concluído'&&d.status!=='Congelado');
  if(S.page==='encerrados')return ds.filter(d=>d.status==='Concluído'||d.status==='Congelado');
  if(S.seg==='ma')return ds.filter(d=>d.tipo==='M&A');
  if(S.seg==='dcm')return ds.filter(d=>d.tipo==='DCM');
  return ds;
}

function renderFormModal(){
  const f=S.editForm,isE=!!f.id;
  const sel=(field,opts)=>`<select onchange="uf('${field}',this.value)">${opts.map(o=>`<option value="${o}"${f[field]===o?' selected':''}>${o}</option>`).join('')}</select>`;
  return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;render()}">
  <div class="modal"><h3>${isE?'Editar projeto':'Novo projeto'}</h3>
    <div class="form-grid"><div class="fg"><label>Tipo</label>${sel('tipo',['M&A','DCM'])}</div><div class="fg"><label>Mandato</label>${sel('mandato',['Sell-side','Buy-side','Captação','Reestruturação','Outro'])}</div></div>
    <div class="form-grid"><div class="fg"><label>Cliente</label><input value="${f.cliente||''}" oninput="uf('cliente',this.value)"/></div><div class="fg"><label>Nome / ID do projeto</label><input value="${f.projeto||''}" oninput="uf('projeto',this.value)"/></div></div>
    <div class="form-grid"><div class="fg"><label>Status</label>${sel('status',['Em execução','Em negociação','Proposta enviada','Em estruturação','Concluído','Congelado'])}</div><div class="fg"><label>Setor</label><input value="${f.setor||''}" oninput="uf('setor',this.value)" placeholder="Ex: Saúde"/></div></div>
    <div class="form-grid"><div class="fg"><label>Deal value (R$)</label><input type="number" value="${f.dealValue||''}" oninput="uf('dealValue',this.value)"/></div><div class="fg"><label>Success fee (%)</label><input type="number" step="0.1" value="${f.successFee||''}" oninput="uf('successFee',this.value)"/></div></div>
    <div style="background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:10px">
      <div style="font-size:10px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Retainer</div>
      <div class="form-grid">
        <div class="fg"><label>Fase 1 — valor por parcela (R$)</label><input type="number" value="${f.retainerFase1||''}" oninput="uf('retainerFase1',this.value)" placeholder="15000"/></div>
        <div class="fg"><label>Fase 2 — mensal recorrente (R$)</label><input type="number" value="${f.retainerFase2||''}" oninput="uf('retainerFase2',this.value)" placeholder="7000"/></div>
      </div>
    </div>
    <div class="form-grid"><div class="fg"><label>Data assinatura</label><input type="date" value="${f.dataAssinatura||''}" oninput="uf('dataAssinatura',this.value)"/></div><div class="fg"><label>Data início</label><input type="date" value="${f.dataInicio||''}" oninput="uf('dataInicio',this.value)"/></div></div>

    <div class="kpi"><div class="kpi-label">Success fee</div><div class="kpi-value">${d.successFee||'—'}%</div><div class="kpi-sub">${d.successFeeFixo?fmtBRL(d.successFeeFixo)+' mínimo':'mínimo não definido'}</div></div>

function renderDashboard(){
  const ds=filtered();
  const ativos=ds.filter(d=>d.status!=='Concluído'&&d.status!=='Congelado');
  const totalDV=ativos.reduce((s,d)=>s+d.dealValue,0);
  const totalRet=ativos.reduce((s,d)=>s+d.retainer,0);
  const totalSF=ativos.reduce((s,d)=>s+d.dealValue*(d.successFee/100),0);
  const byMandato={};ativos.forEach(d=>{byMandato[d.mandato]=(byMandato[d.mandato]||0)+d.dealValue;});
  const maxM=Math.max(...Object.values(byMandato),1);
  const byStatus={};ds.forEach(d=>{byStatus[d.status]=(byStatus[d.status]||0)+1;});
  const byTipo={};ativos.forEach(d=>{byTipo[d.tipo]=(byTipo[d.tipo]||0)+d.dealValue;});
  const maxT=Math.max(...Object.values(byTipo),1);
  const bySetor={};ativos.forEach(d=>{if(d.setor)bySetor[d.setor]=(bySetor[d.setor]||0)+1;});
  return`
  <div class="kpis">
    <div class="kpi accent"><div class="kpi-label">Projetos ativos</div><div class="kpi-value">${ativos.length}</div><div class="kpi-sub">${ds.filter(d=>d.status==='Concluído').length} concluído(s)</div></div>
    <div class="kpi"><div class="kpi-label">Deal value</div><div class="kpi-value">${fmtBRL(totalDV)}</div></div>
    <div class="kpi"><div class="kpi-label">Success fee estimado</div><div class="kpi-value">${fmtBRL(totalSF)}</div></div>
    <div class="kpi"><div class="kpi-label">MRR retainers</div><div class="kpi-value">${fmtBRL(totalRet)}</div><div class="kpi-sub">Recorrente mensal</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Deal value por mandato</div>
      ${Object.keys(byMandato).length===0?'<div class="empty" style="padding:16px">Sem dados</div>':Object.entries(byMandato).map(([k,v])=>`<div class="bar-row"><div class="bar-label"><span>${k}</span><span style="color:var(--gray)">${fmtBRL(v)}</span></div><div class="bar-track"><div class="bar-fill" style="background:${MAND_C[k]||'#888'};width:${Math.round(v/maxM*100)}%"></div></div></div>`).join('')}
    </div>
    <div class="card"><div class="card-title">Deal value por tipo</div>
      ${Object.entries(byTipo).map(([k,v])=>`<div class="bar-row"><div class="bar-label"><span>${k}</span><span style="color:var(--gray)">${fmtBRL(v)}</span></div><div class="bar-track"><div class="bar-fill" style="background:${k==='M&A'?'#0078D4':'#00B4D8'};width:${Math.round(v/maxT*100)}%"></div></div></div>`).join('')}
    </div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Distribuição por setor</div>
      ${Object.keys(bySetor).length===0?'<div class="empty" style="padding:16px">Sem dados de setor</div>':Object.entries(bySetor).map(([k,v],i,a)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:${i<a.length-1?'1px solid var(--border)':'none'}"><span>${k}</span><span style="font-weight:600">${v} deal${v!==1?'s':''}</span></div>`).join('')}
    </div>
    <div class="card"><div class="card-title">Status dos projetos</div>
      ${Object.entries(byStatus).map(([k,v],i,a)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:${i<a.length-1?'1px solid var(--border)':'none'}"><div><span class="dot" style="background:${STATUS_C[k]||'#888'}"></span>${k}</div><span style="font-weight:600">${v}</span></div>`).join('')}
    </div>
  </div>`;
}

function renderReceita(){
  const ativos=S.deals.filter(d=>d.status!=='Concluído'&&d.status!=='Congelado');
  const totalRet=ativos.reduce((s,d)=>s+d.retainer,0);
  const totalSF=ativos.reduce((s,d)=>s+d.dealValue*(d.successFee/100),0);
  const sorted=[...ativos].sort((a,b)=>b.retainer-a.retainer);
  const maxR=Math.max(...sorted.map(d=>d.retainer),1);
  return`
  <div class="kpis">
    <div class="kpi accent"><div class="kpi-label">MRR retainers</div><div class="kpi-value">${fmtBRL(totalRet)}</div></div>
    <div class="kpi"><div class="kpi-label">ARR projetado</div><div class="kpi-value">${fmtBRL(totalRet*12)}</div></div>
    <div class="kpi"><div class="kpi-label">Success fees potenciais</div><div class="kpi-value">${fmtBRL(totalSF)}</div></div>
    <div class="kpi"><div class="kpi-label">Fee médio</div><div class="kpi-value">${ativos.length?(ativos.reduce((s,d)=>s+d.successFee,0)/ativos.length).toFixed(1)+'%':'N/A'}</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Retainer por cliente</div>
      ${sorted.map(d=>`<div class="bar-row"><div class="bar-label"><span style="font-weight:600">${d.cliente}</span><span style="color:var(--gray)">${fmtBRL(d.retainer)}/mês</span></div><div class="bar-track"><div class="bar-fill" style="background:var(--blue);width:${Math.round(d.retainer/maxR*100)}%"></div></div></div>`).join('')}
    </div>
    <div class="card"><div class="card-title">Success fee potencial</div>
      ${S.deals.filter(d=>d.status!=='Congelado').sort((a,b)=>b.dealValue*b.successFee/100-a.dealValue*a.successFee/100).slice(0,10).map((d,i,a)=>{
        const sf=d.dealValue*(d.successFee/100);
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:${i<a.length-1?'1px solid var(--border)':'none'}">
          <div><div style="font-size:12px;font-weight:600">${d.cliente}</div><div style="font-size:10px;color:var(--gray)">${d.successFee}% · ${d.mandato}</div></div>
          <div style="font-size:13px;font-weight:700;color:var(--cyan)">${fmtBRL(sf)}</div>
        </div>`;}).join('')}
    </div>
  </div>`;
}

function renderEquipePage(){
  const byDir={};
  S.deals.forEach(d=>{
    const n=d.diretor||'Não informado';
    if(!byDir[n])byDir[n]={n,deals:0,ativos:0,ret:0,dv:0,sf:0,gerentes:new Set()};
    byDir[n].deals++;
    if(d.status!=='Concluído'&&d.status!=='Congelado')byDir[n].ativos++;
    byDir[n].ret+=d.retainer;byDir[n].dv+=d.dealValue;
    byDir[n].sf+=d.dealValue*(d.successFee/100);
    if(d.gerente)byDir[n].gerentes.add(d.gerente);
  });
  const dirs=Object.values(byDir).filter(d=>d.n!=='Não informado');
  const colors=['#0078D4','#00B4D8','#22C55E','#A78BFA','#F59E0B'];
  return`<div class="grid2">
    ${dirs.length===0?`<div class="card"><div class="empty">Nenhum diretor informado. Edite os projetos para adicionar equipe.</div></div>`:
    dirs.map((d,i)=>`<div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div class="avatar" style="width:44px;height:44px;font-size:14px;background:linear-gradient(135deg,${colors[i%colors.length]},${colors[(i+1)%colors.length]})">${ini(d.n)}</div>
        <div><div style="font-size:14px;font-weight:700">${d.n}</div><div style="font-size:11px;color:var(--gray)">Diretor — ${d.ativos} ativo${d.ativos!==1?'s':''}</div></div>
      </div>
      ${[['Deal value total',fmtBRL(d.dv)],['Retainer total',fmtBRL(d.ret)+'/mês'],['SF potencial',fmtBRL(d.sf)],['Total de deals',d.deals]].map(([k,v],j,a)=>`
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:${j<a.length-1?'1px solid var(--border)':'none'}">
        <span style="color:var(--gray);font-size:12px">${k}</span><span style="font-weight:600;font-size:12px">${v}</span>
      </div>`).join('')}
      ${d.gerentes.size?`<div style="margin-top:10px;font-size:11px;color:var(--gray)">Gerentes: ${[...d.gerentes].join(', ')}</div>`:''}
    </div>`).join('')}
  </div>`;
}

const TITLES={dashboard:'Dashboard',receita:'Receita','projetos-ma':'Projetos M&A','projetos-dcm':'Projetos DCM',encerrados:'Encerrados / Congelados',equipe:'Equipe'};
const SUBS={dashboard:'Visão geral da carteira',receita:'Retainers e success fees','projetos-ma':'Mandatos M&A ativos','projetos-dcm':'Mandatos DCM ativos',encerrados:'Histórico de projetos',equipe:'Performance por diretor'};

function render(){
  const syncTime=S.lastSync?S.lastSync.toLocaleTimeString('pt-BR'):'Carregando...';
  let content='';
  if(S.loading){content=`<div style="display:flex;align-items:center;justify-content:center;padding:80px;gap:12px;color:var(--gray)"><div class="spinner"></div>Carregando dados...</div>`;}
  else if(S.detail){
    content=`<div class="topbar"><div><div class="page-title">Detalhes do projeto</div></div><div style="font-size:11px;color:var(--gray)"><span class="sync-dot"></span>Sync: ${syncTime}</div></div>${renderDetail()}`;
  } else {
    const topbar=`<div class="topbar">
      <div><div class="page-title">${TITLES[S.page]||''}</div><div class="page-sub">${SUBS[S.page]||''}</div></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:11px;color:var(--gray)"><span class="sync-dot"></span>Atualizado: ${syncTime}</div>
        ${S.page==='dashboard'?`<div class="seg"><button class="seg-btn ${S.seg==='consolidado'?'active':''}" onclick="S.seg='consolidado';render()">Consolidado</button><button class="seg-btn ${S.seg==='ma'?'active':''}" onclick="S.seg='ma';render()">M&A</button><button class="seg-btn ${S.seg==='dcm'?'active':''}" onclick="S.seg='dcm';render()">DCM</button></div>`:''}
      </div>
    </div>`;
    switch(S.page){
      case'dashboard':content=topbar+renderDashboard();break;
      case'receita':content=topbar+renderReceita();break;
      case'projetos-ma':content=topbar+renderProjetos();break;
      case'projetos-dcm':content=topbar+renderProjetos();break;
      case'encerrados':content=topbar+renderProjetos();break;
      case'equipe':content=topbar+renderEquipePage();break;
    }
  }
  document.getElementById('sidebar').innerHTML=`
    <div class="sidebar-logo"><div class="logo-row"><div class="logo-box"><div class="logo-diamond"></div></div><span class="logo-txt">APEX</span></div><div class="logo-sub">Investment Banking</div></div>
    ${NAV.map(n=>`<div class="nav-item ${S.page===n.key&&!S.detail?'active':''}" onclick="S.page='${n.key}';S.detail=null;render()"><span class="nav-icon">${n.icon}</span>${n.label}</div>`).join('')}
    <div style="flex:1"></div>
    <div style="border-top:1px solid var(--border);padding:16px"><button class="btn" style="width:100%;font-size:11px" onclick="openAdd()">+ Novo projeto</button></div>`;
  document.getElementById('main').innerHTML=`${content}<div class="footer-bar">APEX PARTNERS — DOCUMENTO CONFIDENCIAL</div>${S.modal==='form'?renderFormModal():S.modal==='equipeForm'?renderEquipeModal():''}`;
}
render();
fetchSheets();
setInterval(fetchSheets,INTERVALO);
</script>
</body>
