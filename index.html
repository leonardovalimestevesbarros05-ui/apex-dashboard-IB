async function hSetEtapa(dealId,idx){const d=S.deals.find(x=>x.id===dealId);if(!d)return;const et={...(d.etapas||{})};if(et[idx]!=='done'){const anx=S.anexos.filter(a=>a.deal_id===dealId&&a.etapa_idx===idx);if(anx.length===0){alert('📎 Anexe pelo menos um documento antes de concluir:\n"'+FASES[idx]?.n+'"');return;}}et[idx]=et[idx]==='done'?'pending':'done';const fa=Object.values(et).filter(v=>v==='done').length;await updEtapas(dealId,et,fa);await addH(dealId,'Etapa',FASES[idx]?.n,et[idx]==='done'?'Concluída':'Reaberta');render();}
async function hSetEtapaDCM(dealId,idx){const d=S.deals.find(x=>x.id===dealId);if(!d)return;const et={...(d.etapas||{})};if(et[idx]!=='done'&&idx>0&&et[idx-1]!=='done'){alert('⚠ Conclua a etapa anterior primeiro:\n"'+FASES_DCM[idx-1]?.n+'"');return;}if(et[idx]!=='done'){const anx=S.anexos.filter(a=>a.deal_id===dealId&&a.etapa_idx===idx);if(anx.length===0){alert('📎 Anexe pelo menos um documento antes de concluir:\n"'+FASES_DCM[idx]?.n+'"');return;}}et[idx]=et[idx]==='done'?'pending':'done';if(et[idx]!=='done'){for(let i=idx+1;i<FASES_DCM.length;i++)if(et[i]==='done')et[i]='pending';}const fa=Object.values(et).filter(v=>v==='done').length;await updEtapas(dealId,et,fa);await addH(dealId,'Etapa DCM',FASES_DCM[idx]?.n,et[idx]==='done'?'Concluída':'Reaberta');render();}

function exportPDF(id){const d=S.deals.find(x=>x.id===id);if(!d)return;const w=window.open('','_blank');const et=d.etapas||{};const feitas=Object.values(et).filter(v=>v==='done').length;const fT=d.tipo==='DCM'?FASES_DCM.length:FASES.length;const pct=Math.round(feitas/fT*100);const sf=(d.deal_value||0)*((d.success_fee||0)/100);const hist=S.historico.filter(h=>h.deal_id===d.id);const fasesRef=d.tipo==='DCM'?FASES_DCM:FASES;w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${d.cliente}</title><style>body{font-family:'Segoe UI',sans-serif;padding:40px;color:#0A1628;font-size:13px}h1{font-size:22px;font-weight:700}h2{font-size:13px;font-weight:700;color:#0078D4;text-transform:uppercase;margin:20px 0 10px;border-bottom:2px solid #E8EEF8;padding-bottom:6px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}.kpi{background:#F0F4FA;border-radius:10px;padding:14px}.kl{font-size:10px;color:#4A6080;text-transform:uppercase;margin-bottom:4px}.kv{font-size:18px;font-weight:700}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:8px;background:#F0F4FA;border-bottom:1px solid #D8E4F0}td{padding:8px;border-bottom:1px solid #E8EEF8}.done{color:#16A34A}.pending{color:#D97706}</style></head><body><h1>${d.projeto||d.cliente}</h1><div class="kpis"><div class="kpi"><div class="kl">Deal Value</div><div class="kv">${fmt(d.deal_value)}</div></div><div class="kpi"><div class="kl">Retainer/mês</div><div class="kv">${fmt(d.retainer_f2)}</div></div><div class="kpi"><div class="kl">Success Fee</div><div class="kv">${d.success_fee||0}%</div></div><div class="kpi"><div class="kl">Progresso</div><div class="kv">${pct}%</div></div></div><h2>Fases</h2><table><thead><tr><th>Etapa</th><th>Fase</th><th>Status</th></tr></thead><tbody>${fasesRef.map((e,i)=>`<tr><td>${e.n}</td><td>Fase ${e.f}</td><td class="${et[i]==='done'?'done':'pending'}">${et[i]==='done'?'✓ Concluído':'Pendente'}</td></tr>`).join('')}</tbody></table>${hist.length?`<h2>Histórico</h2><table><thead><tr><th>Data</th><th>Usuário</th><th>Campo</th><th>Alteração</th></tr></thead><tbody>${hist.slice(0,10).map(h=>`<tr><td>${fmtTS(h.created_at)}</td><td>${h.usuario_nome||'—'}</td><td>${h.campo}</td><td>${h.valor_anterior} → ${h.valor_novo}</td></tr>`).join('')}</tbody></table>`:''}<div style="margin-top:30px;text-align:center;font-size:10px;color:#4A6080">APEX PARTNERS — DOCUMENTO CONFIDENCIAL</div><script>window.print();<\/script></body></html>`);w.document.close();}

>Salvar</button></div></div></div>`;}

function mMeta(){const f=S.editForm||{};return`<div class="modal-bg" onclick="if(event.target===this){S.modal=null;render()}"><div class="modal"><h3>Meta anual — ${f.ano||new Date().getFullYear()}</h3><div class="fgrid"><div class="fg"><label>Meta retainer (R$)</label><input type="number" value="${f.meta_retainer||0}" oninput="uf('meta_retainer',parseFloat(this.value)||0)"/></div><div class="fg"><label>Meta success fee (R$)</label><input type="number" value="${f.meta_success_fee||0}" oninput="uf('meta_success_fee',parseFloat(this.value)||0)"/></div></div><div class="fgrid" style="grid-template-columns:1fr"><div class="fg"><label>Meta total (R$)</label><input type="number" value="${f.meta_total||0}" oninput="uf('meta_total',parseFloat(this.value)||0)"/></div></div><div class="mf"><button class="bgh" onclick="S.modal=null;render()">Cancelar</button><button class="btn" onclick="saveMeta(${f.ano||new Date().getFullYear()},{meta_retainer:S.editForm.meta_retainer||0,meta_success_fee:S.editForm.meta_success_fee||0,meta_total:S.editForm.meta_total||0}).then(()=>{S.modal=null;render()})">Salvar</button></div></div></div>`;}
function sfStepper(d){const et=d.etapas||{};const feitas=Object.values(et).filter(v=>v==='done').length;const pct=Math.round(feitas/FASES.length*100);const rF=(fases,offset)=>fases.map((e,i)=>{const idx=offset+i;const done=et[idx]==='done';const isAct=!done&&idx===feitas;const nA=S.anexos.filter(a=>a.deal_id===d.id&&a.etapa_idx===idx).length;return`<div class="sf-step ${done?'done':isAct?'active':''}" onclick="hSetEtapa('${d.id}',${idx})" title="${done?'Reabrir':nA===0?'Anexe primeiro':'Concluir'}"><div class="sf-circle">${done?'✓':nA===0?'📎':idx+1}</div><div class="sf-label">${e.n}${nA===0&&!done?'<br><span style="color:var(--red);font-size:8px">sem anexo</span>':''}</div></div>`;}).join('');const f1=FASES.filter(x=>x.f===1);const f2=FASES.filter(x=>x.f===2);return`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:12px;font-weight:600">Progresso: <span style="color:var(--blue)">${pct}%</span> — ${feitas}/${FASES.length} etapas</div></div><div style="height:6px;background:var(--bg3);border-radius:3px;margin-bottom:18px;overflow:hidden"><div style="height:6px;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:3px;width:${pct}%;transition:width .4s"></div></div><div class="sf-fase-lbl">Fase 1 — Preparation & Marketing</div><div class="sf-wrap"><div class="sf-track">${rF(f1,0)}</div></div><div class="sf-fase-lbl" style="margin-top:8px;color:var(--cyan)">Fase 2 — Execution & Closing</div><div class="sf-wrap"><div class="sf-track">${rF(f2,6)}</div></div></div>`;}
function dcmStepper(d){const et=d.etapas||{};const total=FASES_DCM.length;const feitas=Object.values(et).filter(v=>v==='done').length;const pct=Math.round(feitas/total*100);const f1=FASES_DCM.filter(x=>x.f===1);const f2=FASES_DCM.filter(x=>x.f===2);const rF=(fases,offset)=>fases.map((e,i)=>{const idx=offset+i;const done=et[idx]==='done';const isAct=!done&&idx===feitas;const isLk=!done&&idx>0&&et[idx-1]!=='done';const nA=S.anexos.filter(a=>a.deal_id===d.id&&a.etapa_idx===idx).length;return`<div class="sf-step ${done?'done':isAct?'active':''}" onclick="hSetEtapaDCM('${d.id}',${idx})" style="${isLk?'opacity:.4;cursor:not-allowed':''}"><div class="sf-circle">${done?'✓':isLk?'🔒':nA===0?'📎':idx+1}</div><div class="sf-label">${e.n}${nA===0&&!done?'<br><span style="color:var(--red);font-size:8px">sem anexo</span>':''}</div></div>`;}).join('');return`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:12px;font-weight:600">Progresso: <span style="color:var(--cyan)">${pct}%</span> — ${feitas}/${total} etapas</div></div><div style="height:6px;background:var(--bg3);border-radius:3px;margin-bottom:18px;overflow:hidden"><div style="height:6px;background:linear-gradient(90deg,var(--cyan),#0052A3);border-radius:3px;width:${pct}%;transition:width .4s"></div></div><div class="sf-fase-lbl" style="background:rgba(0,180,216,.1);color:var(--cyan)">Fase 1 — Preparação & Estruturação</div><div class="sf-wrap"><div class="sf-track">${rF(f1,0)}</div></div><div class="sf-fase-lbl" style="margin-top:8px;background:rgba(0,120,212,.1);color:var(--blue)">Fase 2 — Distribuição & Liquidação</div><div class="sf-wrap"><div class="sf-track">${rF(f2,4)}</div></div></div>`;}
function renderComts(dealId,idx,comtsD){const k=`${dealId}_${idx}`;const sh=S.novoComt[`sh_${k}`];const comtsEt=comtsD.filter(c=>c.etapa_idx===idx);const u=S.currentUser;const deal=S.deals.find(x=>x.id===dealId);const bloqueado=deal&&isEncerrado(deal);if(bloqueado&&!comtsEt.length)return'';if(bloqueado)return`<div>${comtsEt.map(c=>`<div class="cmt-item"><div class="cmt-meta"><strong>${c.usuario_nome||'—'}</strong> · ${fmtTS(c.created_at)}</div><div class="cmt-text">${c.texto}</div></div>`).join('')}</div>`;if(!sh&&!comtsEt.length)return`<button class="bgh bsm" onclick="togComt('${k}')">💬 Comentar</button>`;return`<div style="margin-top:6px">${!sh&&comtsEt.length?`<button class="bgh bsm" onclick="togComt('${k}')">💬 ${comtsEt.length}</button>`:''}${sh?`<div>${comtsEt.map(c=>{const isE=S.editandoComt?.id===c.id;const isMine=c.usuario_id===u?.id;return`<div class="cmt-item"><div class="cmt-meta"><span><strong>${c.usuario_nome||'—'}</strong> · ${fmtTS(c.created_at)}</span>${isMine?`<div class="cmt-actions">${isE?`<button class="bgh bsm" onclick="cancelEditComt()">Cancelar</button><button class="btn bsm" onclick="saveEditComt()">Salvar</button>`:`<button class="bgh bsm" onclick="startEditComt('${c.id}','${c.texto.replace(/'/g,"\\'")}')">Editar</button><button class="bdg bsm" onclick="hDelComt('${c.id}')">✕</button>`}</div>`:''}</div>${isE?`<input style="width:100%;background:var(--input);border:1px solid var(--blue);border-radius:6px;padding:6px 9px;color:var(--text);font-size:12px;font-family:inherit;outline:none" value="${S.editandoComt.txt}" oninput="S.editandoComt.txt=this.value"/>`:` <div class="cmt-text">${c.texto}</div>`}</div>`;}).join('')}<div class="cmt-inp"><input id="cinput_${k}" placeholder="Adicionar comentário..." oninput="S.novoComt['${k}']=this.value" onkeydown="if(event.key==='Enter')hAddComt('${dealId}',${idx})"/><button class="btn bsm" onclick="hAddComt('${dealId}',${idx})">Enviar</button></div><button class="bgh bsm" style="margin-top:6px" onclick="togComt('${k}')">Fechar</button></div>`:''}</div>`;}
function calcPL(d){const horasD=S.horas.filter(h=>h.deal_id===d.id);const totalHoras=horasD.reduce((s,h)=>s+(h.horas||0),0);const retRecebido=S.retParcelas.filter(p=>p.deal_id===d.id&&p.status==='Recebido').reduce((s,p)=>s+(p.valor||0),0);const recReal=S.recReal.filter(r=>r.deal_id===d.id).reduce((s,r)=>s+(r.valor||0),0);const sfRealizado=d.status_novo==='Encerrado – Ganho'?(d.deal_value||0)*((d.success_fee||0)/100):0;const receitaTotal=retRecebido+recReal+sfRealizado;const valorHora=totalHoras>0?receitaTotal/totalHoras:0;const custoEstimado=totalHoras*250;const lucro=receitaTotal-custoEstimado;const margem=receitaTotal>0?Math.round((lucro/receitaTotal)*100):0;return{totalHoras,retRecebido,recReal,sfRealizado,receitaTotal,valorHora,custoEstimado,lucro,margem};}
function renderDetalhe(d){
  const et=d.etapas||{};
  const fasesTotal=d.tipo==='DCM'?FASES_DCM.length:FASES.length;
  const feitas=Object.values(et).filter(v=>v==='done').length;
  const horasD=S.horas.filter(h=>h.deal_id===d.id);
  const totalH=horasD.reduce((s,h)=>s+(h.horas||0),0);
  const eq=[{r:'Diretor',n:d.diretor},{r:'Gerente',n:d.gerente},{r:'Analista',n:d.analista}].filter(p=>p.n);
  const sf=(d.deal_value||0)*((d.success_fee||0)/100);
  const pct=Math.round(feitas/fasesTotal*100);
  const comtsD=S.comentarios.filter(c=>c.deal_id===d.id);
  const histD=S.historico.filter(h=>h.deal_id===d.id);
  const isDCM=d.tipo==='DCM';
  const isDealEncerrado=isEncerrado(d);
  const pl=isDealEncerrado?calcPL(d):null;
  const tab=S.detalheTab||'fases';
  const fasesRef=isDCM?FASES_DCM:FASES;
  const nAnexosTotal=S.anexos.filter(a=>a.deal_id===d.id).length;
  const header=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px">
    <div>
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
        ${bdg(d.tipo,isDCM?'#00B4D8':'#0078D4')}${bdg(d.mandato,MC[d.mandato]||'#888')}${statusNovoBdg(d.status_novo||'Ativo')}${bdg(d.prob||'Alta',PC[d.prob]||'#888')}${pt(d.polo)}
        ${(()=>{const{score,cor}=dealScore(d);return score?`<span style="background:${cor}22;color:${cor};font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px">Score ${score}</span>`:''})()}
      </div>
      <h2 style="font-size:20px;font-weight:700;margin-bottom:4px">${d.projeto||d.cliente}</h2>
      <div style="font-size:13px;color:var(--text2)">${d.cliente}${d.cnpj?' · CNPJ '+d.cnpj:''}</div>
      ${d.setor?`<div style="margin-top:8px"><span style="background:rgba(0,180,216,.12);color:var(--cyan);font-size:10px;font-weight:700;padding:3px 12px;border-radius:6px">${d.setor}</span></div>`:''}
      ${d.motivo_encerramento?`<div style="margin-top:6px;font-size:11px;color:var(--amber);padding:5px 10px;background:rgba(245,158,11,.08);border-radius:6px;border-left:3px solid var(--amber)">Motivo: ${d.motivo_encerramento}</div>`:''}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start">
      <div style="display:flex;flex-wrap:wrap;gap:3px;padding:4px;background:var(--bg3);border-radius:12px;border:1px solid var(--border)">
        ${[{k:'Ativo',label:'● Ativo',cor:'#22C55E'},{k:'On Hold',label:'⏸ Hold',cor:'#F59E0B'},{k:'Encerrado – Ganho',label:'🏆 Ganho',cor:'#0078D4'},{k:'Encerrado – Perdido',label:'✗ Perdido',cor:'#EF4444'},{k:'Encerrado – Rescindido',label:'⊘ Rescindido',cor:'#64748B'}].map(op=>{const sn=d.status_novo||'Ativo';const isActive=sn===op.k;return`<button onclick="hSetStatusNovo('${d.id}','${op.k}')" style="padding:4px 10px;font-size:10px;font-weight:${isActive?700:500};border-radius:8px;border:none;background:${isActive?op.cor+'22':'transparent'};color:${isActive?op.cor:'var(--text2)'};cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap${isActive?';outline:2px solid '+op.cor+';outline-offset:-1px':''}">${op.label}</button>`;}).join('')}
      </div>
      <div style="display:flex;gap:6px">
        <button class="bgh bsm" onclick="exportPDF('${d.id}')">📄 PDF</button>
        <button class="bgh" onclick="openEditDeal('${d.id}')">Editar</button>
        <button class="bgh" onclick="S.detail=null;S.detailType=null;S.detalheTab='fases';render()">← Voltar</button>
      </div>
    </div>
  </div>`;
  const kpis=`<div class="kpis k5" style="margin-bottom:22px">
    <div class="kpi ac"><div class="kl">Deal value</div><div class="kv">${fmt(d.deal_value)}</div></div>
    <div class="kpi"><div class="kl">Retainer F2/mês</div><div class="kv">${fmt(d.retainer_f2)}</div><div class="ks">F1: ${fmt(d.retainer_f1||15000)} × 2</div></div>
    <div class="kpi"><div class="kl">Success fee</div><div class="kv">${d.success_fee||0}%</div><div class="ks">${fmt(sf)} potencial</div></div>
    <div class="kpi"><div class="kl">Horas BIB</div><div class="kv">${totalH.toFixed(1)}h</div></div>
    <div class="kpi" style="${agingDias(d)>60?'background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2)':agingDias(d)>30?'background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)':''}">
      <div class="kl">Aging</div><div class="kv" style="font-size:18px;color:${agingDias(d)>60?'var(--red)':agingDias(d)>30?'var(--amber)':'var(--text)'}">${agingDias(d)}d</div><div class="ks">Desde abertura</div>
    </div>
  </div>`;
  const tabNav=`<div class="tab-nav">
    <button class="tab-btn ${tab==='fases'?'active':''}" onclick="S.detalheTab='fases';render()">
      ${isDCM?'⬡ Fases DCM':'◈ Fases M&A'}&nbsp;<span style="font-size:9px;opacity:.7">${pct}%</span>
    </button>
    <button class="tab-btn ${tab==='arquivos'?'active':''}" onclick="S.detalheTab='arquivos';render()">
      📎 Arquivos${nAnexosTotal?` <span style="font-size:9px;opacity:.7">(${nAnexosTotal})</span>`:''}
    </button>
    <button class="tab-btn ${tab==='contrato'?'active':''}" onclick="S.detalheTab='contrato';render()">
      📋 Contrato &amp; Equipe
    </button>
    <button class="tab-btn ${tab==='horas'?'active':''}" onclick="S.detalheTab='horas';render()">
      ◷ Horas${horasD.length?` <span style="font-size:9px;opacity:.7">(${totalH.toFixed(0)}h)</span>`:''}
    </button>
    <button class="tab-btn ${tab==='retainer'?'active':''}" onclick="S.detalheTab='retainer';render()">
      💰 Retainer${S.retParcelas.filter(p=>p.deal_id===d.id).length?` <span style="font-size:9px;opacity:.7">(${S.retParcelas.filter(p=>p.deal_id===d.id).length})</span>`:''}
    </button>
  </div>`;
  function mkArqCard(a,col){const fi=fileIcon(a.tipo_arquivo,a.nome_arquivo);return`<div class="arquivo-card" style="flex:1;min-width:${col||180}px;max-width:${col?col+80:280}px">

    <div class="arquivo-info">
      <div class="arquivo-nome" title="${a.nome_arquivo}">${a.nome_arquivo}</div>
      <div class="arquivo-meta">${fmtBytes(a.tamanho_bytes)}${a.tamanho_bytes?' · ':''}${a.usuario_nome||'—'}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0">
      <button class="bgh bsm" onclick="downloadAnexo('${a.id}')">⬇</button>
      <button class="bdg bsm" onclick="delAnexo('${a.id}')">✕</button>
    </div>
  </div>`;}
  function mkAnexarBtn(idx,nome){return`<label class="anexar-btn">📎 Anexar<input type="file" style="display:none" accept="${ACCEPT_FILES}" onchange="(async f=>{if(!f.target.files[0])return;const r=await uploadAnexo('${d.id}',${idx},'${nome.replace(/'/g,"\\'").replace(/"/g,'&quot;')}',f.target.files[0]);if(r)render();})(event)"/></label>`;}
  function tabFases(){
    return`<div class="tab-content">
      <div class="card">
        <div class="ct">Progresso das Fases ${isDCM?'DCM':'M&A'}</div>
        ${isDCM?dcmStepper(d):sfStepper(d)}
      </div>
      <div class="card">
        <div class="ct">Checklist detalhado</div>
        ${fasesRef.map((e,i)=>{
          const done=et[i]==='done';
          const anx=S.anexos.filter(a=>a.deal_id===d.id&&a.etapa_idx===i);
          const isFaseBreak=!isDCM&&i===6;
          return`${isFaseBreak?'<div style="padding:8px 0 4px;font-size:10px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;border-top:2px solid rgba(0,180,216,.2);margin-top:8px">⬡ Fase 2 — Execution &amp; Closing</div>':''}
          <div style="padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap">

                <span style="font-size:20px;cursor:pointer;flex-shrink:0" onclick="${isDCM?`hSetEtapaDCM('${d.id}',${i})`:`hSetEtapa('${d.id}',${i})`}">${done?'✅':'⬜'}</span>
                <div>
                  <div style="font-size:13px;font-weight:${done?600:500};color:${done?'var(--green)':'var(--text)'}">${e.n}</div>

                    ${anx.length>0?`<span style="font-size:9px;color:var(--green);background:rgba(34,197,94,.1);padding:1px 7px;border-radius:4px">✓ ${anx.length} arquivo${anx.length!==1?'s':''}</span>`:''}

          </div>`;}).join('')}
      </div>
    </div>`;
  }
  function tabArquivos(){
    const todos=S.anexos.filter(a=>a.deal_id===d.id);
    return`<div class="tab-content">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div>
            <div class="ct" style="margin:0">Central de Arquivos</div>
            <div style="font-size:11px;color:var(--text2);margin-top:4px">${todos.length} arquivo${todos.length!==1?'s':''} · PDF, Word, Excel, PPT, Imagens</div>

  function tabRetainer(){
    const parc=[...S.retParcelas.filter(p=>p.deal_id===d.id)].sort((a,b)=>{const[ma,ya]=a.mes.split('/');const[mb,yb]=b.mes.split('/');return new Date(ya,ma-1)-new Date(yb,mb-1);});

        </div>

        ${parc.length===0?`<div style="text-align:center;padding:40px"><div style="font-size:36px;margin-bottom:12px;opacity:.5">💰</div><div style="font-size:13px;font-weight:600;color:var(--text2)">${d.data_assinatura?'Use "⟳ Gerar cronograma"':'Cadastre a data de assinatura primeiro'}</div></div>`:`
        <div style="overflow-x:auto"><table><thead><tr><th>Mês</th><th>Tipo</th><th>Valor</th><th>Status</th><th>E-mail enviado</th><th>Recebido em</th><th>Obs</th><th></th></tr></thead>
        <tbody>${parc.map(p=>{const pid=p.id;return`<tr>

          <td><input type="date" value="${p.data_envio||''}" style="background:var(--input);border:1px solid var(--border);border-radius:6px;padding:4px 7px;color:var(--text);font-size:11px;font-family:inherit" onchange="(async()=>{const pp=S.retParcelas.find(x=>x.id==='${pid}');if(pp)await updRetStatus('${pid}',pp.status,{data_envio:this.value||null});})()"/></td>
          <td><input type="date" value="${p.data_recebimento||''}" style="background:var(--input);border:1px solid var(--border);border-radius:6px;padding:4px 7px;color:var(--text);font-size:11px;font-family:inherit" onchange="(async()=>{const pp=S.retParcelas.find(x=>x.id==='${pid}');if(pp)await updRetStatus('${pid}',pp.status,{data_recebimento:this.value||null});})()"/></td>
          <td style="font-size:11px;color:var(--text2)">${p.observacao||''}</td>
          <td><button class="bdg bsm" onclick="delRetParcela('${pid}')">✕</button></td>
        </tr>`;}).join('')}</tbody></table></div>`}
      </div>
    </div>`;
  }
  let tabContent='';
  if(tab==='fases')tabContent=tabFases();
  else if(tab==='arquivos')tabContent=tabArquivos();
  else if(tab==='contrato')tabContent=tabContrato();
  else if(tab==='horas')tabContent=tabHoras();

}
function renderPerfilAnalista(uid){const u=S.usuarios.find(x=>x.id===uid);if(!u)return'';const deals=S.deals.filter(d=>d.diretor===u.nome||d.gerente===u.nome||d.analista===u.nome);const horasU=S.horas.filter(h=>h.usuario_id===uid);const totalH=horasU.reduce((s,h)=>s+(h.horas||0),0);const bib=horasU.filter(h=>h.tipo_hora==='BIB').reduce((s,h)=>s+(h.horas||0),0);const nib=horasU.filter(h=>h.tipo_hora!=='BIB').reduce((s,h)=>s+(h.horas||0),0);const byDeal={};horasU.forEach(h=>{byDeal[h.deal_id]=(byDeal[h.deal_id]||0)+(h.horas||0);});const totalRet=deals.filter(d=>isAtivo(d)).reduce((s,d)=>s+(d.retainer_f2||0),0);const totalSF=deals.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);return`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px"><div style="display:flex;align-items:center;gap:16px"><div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff">${ini(u.nome)}</div><div><h2 style="font-size:18px;font-weight:700">${u.nome}</h2><div style="font-size:12px;color:var(--text2);margin-top:4px">${u.cargo} · ${pt(u.polo)} · ${u.area||'—'}</div></div></div><div style="display:flex;gap:8px"><button class="btn bsm" onclick="openAddHora()">+ Lançar horas</button><button class="bgh" onclick="S.detail=null;S.detailType=null;S.detalheTab='fases';render()">← Voltar</button></div></div><div class="kpis k4"><div class="kpi ac"><div class="kl">Projetos</div><div class="kv">${deals.length}</div></div><div class="kpi"><div class="kl">Retainer</div><div class="kv">${fmt(totalRet)}</div></div><div class="kpi ac2"><div class="kl">SF potencial</div><div class="kv">${fmt(totalSF)}</div></div><div class="kpi ac3"><div class="kl">Horas totais</div><div class="kv">${totalH.toFixed(1)}h</div><div class="ks">BIB ${bib.toFixed(1)}h · NIB ${nib.toFixed(1)}h</div></div></div><div class="g2"><div class="card"><div class="ct">Horas por projeto</div>${Object.entries(byDeal).length===0?`<div class="empty">Sem horas</div>`:Object.entries(byDeal).map(([did,h])=>{const d=S.deals.find(x=>x.id===did);const mx=Math.max(...Object.values(byDeal),1);const pct=Math.round(h/mx*100);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:600">${d?d.cliente:did}</span><span style="color:var(--blue)">${h.toFixed(1)}h</span></div><div style="height:6px;background:var(--bg3);border-radius:3px"><div style="height:6px;background:var(--blue);border-radius:3px;width:${pct}%"></div></div></div>`;}).join('')}</div><div class="card"><div class="ct">Projetos</div>${deals.length===0?`<div class="empty">Nenhum projeto</div>`:deals.slice(0,8).map((d,i,a)=>{const feitas=Object.values(d.etapas||{}).filter(v=>v==='done').length;const fT=d.tipo==='DCM'?FASES_DCM.length:FASES.length;const pct=Math.round(feitas/fT*100);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:${i<a.length-1?'1px solid var(--border)':'none'}"><div><span style="font-weight:600;cursor:pointer;color:var(--blue)" onclick="S.detail='${d.id}';S.detailType='deal';S.detalheTab='fases';render()">${d.cliente}</span>${statusNovoBdg(d.status_novo||'Ativo')}</div><div style="text-align:right"><div style="font-size:11px;font-weight:600">${fmt(d.deal_value)}</div><div style="font-size:10px;color:var(--text2)">${pct}%</div></div></div>`;}).join('')}</div></div>`;
}
function filtrados(){let l=S.deals;if(S.filtroColab)l=l.filter(d=>d.diretor===S.filtroColab||d.gerente===S.filtroColab||d.analista===S.filtroColab);return l;}

async function savePipeDeal(d){
  const isN=!d.id||d.id.startsWith('new_');
  if(isN){const t={...d};delete t.id;const{data:nd}=await sb.from('pipe_deals').insert(t).select().single();if(nd)S.pipe.unshift(nd);}
  else{await sb.from('pipe_deals').update({...d,updated_at:new Date()}).eq('id',d.id);const i=S.pipe.findIndex(x=>x.id===d.id);if(i>=0)S.pipe[i]={...S.pipe[i],...d};}
}
async function delPipeDeal(id){
  await sb.from('pipe_atividades').delete().eq('pipe_deal_id',id);
  await sb.from('pipe_anexos').delete().eq('pipe_deal_id',id);
  await sb.from('pipe_deals').delete().eq('id',id);
  S.pipe=S.pipe.filter(x=>x.id!==id);
  S.pipeAtiv=S.pipeAtiv.filter(x=>x.pipe_deal_id!==id);
  S.pipeAnexos=S.pipeAnexos.filter(x=>x.pipe_deal_id!==id);
}
async function savePipeAtiv(d){
  const isN=!d.id||d.id.startsWith('new_');
  if(isN){const t={...d};delete t.id;const{data:nd}=await sb.from('pipe_atividades').insert(t).select().single();if(nd)S.pipeAtiv.unshift(nd);}
  else{await sb.from('pipe_atividades').update(d).eq('id',d.id);const i=S.pipeAtiv.findIndex(x=>x.id===d.id);if(i>=0)S.pipeAtiv[i]={...S.pipeAtiv[i],...d};}
}
async function delPipeAtiv(id){await sb.from('pipe_atividades').delete().eq('id',id);S.pipeAtiv=S.pipeAtiv.filter(x=>x.id!==id);render();}
async function uploadPipeAnexo(pipeId,file,isContrato){
  const path=`pipe/${pipeId}/${Date.now()}_${file.name}`;
  const{error:upErr}=await sb.storage.from('apex-anexos').upload(path,file);
  if(upErr){alert('Erro ao enviar: '+upErr.message);return null;}
  const u=S.currentUser;
  const{data:nd}=await sb.from('pipe_anexos').insert({pipe_deal_id:pipeId,nome_arquivo:file.name,storage_path:path,tamanho_bytes:file.size,tipo_arquivo:file.type,is_contrato:!!isContrato,usuario_id:u?.id,usuario_nome:u?.nome||'—'}).select().single();
  if(nd)S.pipeAnexos.push(nd);
  if(isContrato){await sb.from('pipe_deals').update({contrato_path:path,contrato_nome:file.name,updated_at:new Date()}).eq('id',pipeId);const i=S.pipe.findIndex(x=>x.id===pipeId);if(i>=0){S.pipe[i].contrato_path=path;S.pipe[i].contrato_nome=file.name;}}
  return nd;
}
async function delPipeAnexo(id){
  const a=S.pipeAnexos.find(x=>x.id===id);
  if(a)await sb.storage.from('apex-anexos').remove([a.storage_path]);
  await sb.from('pipe_anexos').delete().eq('id',id);
  S.pipeAnexos=S.pipeAnexos.filter(x=>x.id!==id);render();
}
async function downloadPipeAnexo(id){
  const a=S.pipeAnexos.find(x=>x.id===id);if(!a)return;
  const{data}=await sb.storage.from('apex-anexos').createSignedUrl(a.storage_path,60);
  if(data?.signedUrl)window.open(data.signedUrl,'_blank');
}

function mkChart(id,cfg){
  const el=document.getElementById(id);if(!el)return;
  try{const ex=Chart.getChart(id);if(ex)ex.destroy();}catch{}
  try{const ex2=Chart.getChart(el);if(ex2)ex2.destroy();}catch{}
  try{S.charts[id]=new Chart(el,cfg);}catch(e){console.error('mkChart error ['+id+']:',e);}
}

    const mrrH=getMRRHistorico();
    if(document.getElementById('cMRR')){const metaMRR=getMeta(new Date().getFullYear());const metaMensalRet=metaMRR.meta_retainer?metaMRR.meta_retainer/12:0;if(mrrH.length){mkChart('cMRR',{type:'bar',data:{labels:mrrH.map(x=>x[0]),datasets:[{label:'Retainer recebido',data:mrrH.map(x=>x[1]),backgroundColor:mrrH.map(x=>x[1]>=metaMensalRet?'rgba(34,197,94,.7)':'rgba(245,158,11,.7)'),borderRadius:5,borderWidth:0,order:2},{label:'Meta mensal',data:mrrH.map(()=>metaMensalRet),type:'line',borderColor:'#EF4444',borderDash:[6,3],borderWidth:2,pointRadius:0,fill:false,order:1}]},options:{plugins:{legend:{labels:lbl}},scales:{x:{ticks:darkTick,grid},y:{ticks:{...darkTick,callback:v=>v>=1e3?`${(v/1e3).toFixed(0)}K`:v},grid}},responsive:true,maintainAspectRatio:false}});}else{mkChart('cMRR',{type:'bar',data:{labels:getMeses().slice(0,6).reverse(),datasets:[{label:'Projeção',data:getMeses().slice(0,6).map(()=>at.reduce((s,d)=>s+(d.retainer_f2||0),0)),backgroundColor:'rgba(0,120,212,.5)',borderRadius:5,borderWidth:0}]},options:{plugins:{legend:{labels:lbl}},scales:{x:{ticks:darkTick,grid},y:{ticks:{...darkTick,callback:v=>v>=1e3?`${(v/1e3).toFixed(0)}K`:v},grid}},responsive:true,maintainAspectRatio:false}});}}
    if(document.getElementById('cRecMensal')){

    S.retParcelas.filter(p=>p.status==='Recebido').forEach(p=>{const[m,y]=p.mes.split('/');if(parseInt(y)===anoMensal){const idx=parseInt(m)-1;if(idx>=0&&idx<12)recPorMes[idx]+=p.valor||0;}});
    S.recReal.forEach(r=>{if(r.data_pagamento){const d2=new Date(r.data_pagamento);if(d2.getFullYear()===anoMensal)recPorMes[d2.getMonth()]+=r.valor||0;}});
    mkChart('cRecMensal',{type:'bar',data:{labels:mesesBar,datasets:[{label:'Receita realizada',data:recPorMes,backgroundColor:recPorMes.map(v=>v>0?'rgba(0,120,212,.7)':'rgba(0,120,212,.2)'),borderRadius:6,borderWidth:0}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8899B0',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#8899B0',font:{size:9},callback:v=>v>=1e3?`${(v/1e3).toFixed(0)}K`:v},grid:{color:'rgba(255,255,255,0.04)'}}},responsive:true,maintainAspectRatio:false}});}
        if(document.getElementById('cAging')){const bands=['0-30d','30-60d','60-90d','90-120d','>120d'];const aC=[0,0,0,0,0];fl.forEach(d=>{const dias=agingDias(d);if(dias<=30)aC[0]++;else if(dias<=60)aC[1]++;else if(dias<=90)aC[2]++;else if(dias<=120)aC[3]++;else aC[4]++;});mkChart('cAging',{type:'bar',data:{labels:bands,datasets:[{data:aC,backgroundColor:['#22C55E','#84CC16','#F59E0B','#F97316','#EF4444'],borderRadius:5,borderWidth:0}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:darkTick,grid},y:{ticks:{...darkTick,font:{size:10}},grid:{display:false}}},responsive:true,maintainAspectRatio:false}});}
  }
  if(S.page==='receita'){const atR=ativos(S.deals);
    const anoRecR=new Date().getFullYear();
    const mesesRecR=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const recPMes=new Array(12).fill(0);
    S.retParcelas.filter(p=>p.status==='Recebido').forEach(p=>{const[m,y]=p.mes.split('/');if(parseInt(y)===anoRecR){const idx=parseInt(m)-1;if(idx>=0&&idx<12)recPMes[idx]+=p.valor||0;}});
    S.recReal.forEach(r=>{if(r.data_pagamento){const dr=new Date(r.data_pagamento);if(dr.getFullYear()===anoRecR)recPMes[dr.getMonth()]+=r.valor||0;}});
    if(document.getElementById('cRecMensalReceita'))mkChart('cRecMensalReceita',{type:'bar',data:{labels:mesesRecR,datasets:[{label:'Receita',data:recPMes,backgroundColor:recPMes.map(v=>v>0?'rgba(0,120,212,.7)':'rgba(0,120,212,.18)'),borderRadius:6,borderWidth:0}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8899B0',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#8899B0',font:{size:9},callback:v=>v>=1e6?`${(v/1e6).toFixed(1)}M`:v>=1e3?`${(v/1e3).toFixed(0)}K`:v},grid:{color:'rgba(255,255,255,0.04)'}}},responsive:true,maintainAspectRatio:false}});const mrrR=atR.reduce((s,d)=>s+(d.retainer_f2||0),0);const sfPotR=atR.reduce((s,d)=>s+(d.deal_value||0)*((d.success_fee||0)/100),0);if(document.getElementById('cRetSF'))mkChart('cRetSF',{type:'doughnut',data:{labels:['Retainer mensal','Success Fee potencial'],datasets:[{data:[mrrR,sfPotR],backgroundColor:['#0078D4','#00B4D8'],borderWidth:0}]},options:{cutout:'65%',plugins:{legend:{labels:lbl}},responsive:true,maintainAspectRatio:false}});}
}
function render(){
  const app=document.getElementById('app');
  if(!S.loggedIn){app.innerHTML=`<div class="login-wrap"><div class="login-card"><div style="text-align:center;margin-bottom:24px"><div style="display:flex;justify-content:center;margin-bottom:10px"><div style="width:40px;height:40px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center"><div style="width:14px;height:14px;background:var(--bg2);transform:rotate(45deg)"></div></div></div><div style="font-size:22px;font-weight:700;letter-spacing:3px">APEX</div><div style="font-size:11px;color:var(--text2);margin-top:4px">Investment Banking Platform</div></div><div class="lf"><label>E-mail</label><input type="email" value="${S.loginEmail}" oninput="S.loginEmail=this.value" placeholder="seu@apexpartners.com.br" onkeydown="if(event.key==='Enter')tentarLogin()"/></div><div class="lf"><label>Senha</label><input type="password" value="${S.loginSenha}" oninput="S.loginSenha=this.value" placeholder="••••••••" onkeydown="if(event.key==='Enter')tentarLogin()"/></div><button class="login-btn" onclick="tentarLogin()">Entrar</button>${S.loginErr?`<div class="login-err">${S.loginErr}</div>`:''}</div></div>`;return;}
  const syncTime=S.lastSync?S.lastSync.toLocaleTimeString('pt-BR'):'—';const u=S.currentUser;
  let content='';
  if(S.loading){content=`<div style="display:flex;align-items:center;justify-content:center;padding:80px;gap:12px;color:var(--text2)"><div class="spinner"></div>Carregando...</div>`;}
  else if(S.detail&&S.detailType==='analista'){content=`<div class="topbar"><div><div class="page-title">Perfil do colaborador</div></div><div style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</div></div>${renderPerfilAnalista(S.detail)}`;}
  else if(S.pipeDetail){const pd=S.pipe.find(x=>x.id===S.pipeDetail);content=`<div class="topbar"><div><div class="page-title">Pipe M&A — Detalhe</div><div class="page-sub">${pd?.nome||''}</div></div><div style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</div></div>${renderPipeDetalhe(pd)}`;}
  else if(S.detail&&S.detailType==='deal'){const d=S.deals.find(x=>x.id===S.detail);content=`<div class="topbar"><div><div class="page-title">Detalhes do projeto</div><div class="page-sub">${d?.cliente||''}</div></div><div style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</div></div>${d?renderDetalhe(d):`<div class="empty">Não encontrado.</div>`}`;}
  else{
    const hasSeg=['dashboard','pipeline'].includes(S.page);
    const topbar=`<div class="topbar"><div><div class="page-title">${TITLES[S.page]||''}</div><div class="page-sub">${SUBS[S.page]||''}</div></div><div class="topbar-right"><span style="font-size:11px;color:var(--text2)"><span class="sync-dot"></span>${syncTime}</span>${hasSeg?`<div class="seg"><button class="seg-btn ${S.seg==='geral'?'active':''}" onclick="S.seg='geral';render()">Geral</button><button class="seg-btn ${S.seg==='ma'?'active':''}" onclick="S.seg='ma';render()">M&A</button><button class="seg-btn ${S.seg==='dcm'?'active':''}" onclick="S.seg='dcm';render()">DCM</button></div>`:''} ${hasSeg?`<select class="fsel" onchange="S.filtroColab=this.value;render()"><option value="">Todos os colaboradores</option>${S.usuarios.map(uu=>`<option value="${uu.nome}"${S.filtroColab===uu.nome?' selected':''}>${uu.nome}</option>`).join('')}</select>`:''}</div></div>`;
    switch(S.page){case'pipe':content=topbar+renderPipe();break;case'dashboard':content=topbar+renderDash();break;case'pipeline':content=topbar+renderPipeline();break;case'ma':case'dcm':case'encerrados':case'onhold':content=topbar+renderProjetos();break;case'receita':content=topbar+renderReceita();break;case'horas':content=topbar+renderHoras();break;case'equipe':content=topbar+renderEquipe();break;case'tarefas':content=topbar+renderTarefas();break;}
  }
  const sidebar=`<div class="sidebar"><div class="sidebar-logo"><div class="logo-row"><div class="logo-box"><div class="logo-diamond"></div></div><div><div class="logo-txt">APEX</div><div class="logo-sub">Investment Banking</div></div></div></div>${NAV.map(n=>n.s?`<div class="nav-section">${n.s}</div>`:`<div class="nav-item ${S.page===n.k&&!S.detail?'active':''}" onclick="S.page='${n.k}';S.detail=null;S.detailType=null;S.detalheTab='fases';S.pipeDetail=null;render()"><span class="nav-icon">${n.i}</span>${n.l}${(()=>{if(!n.badge)return'';const hoje=new Date();hoje.setHours(0,0,0,0);const v=S.tarefas.filter(t=>t.responsavel_id===S.currentUser?.id&&t.status!=='Concluída'&&t.prazo&&new Date(t.prazo)<hoje).length;return v?`<span style="margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px">${v}</span>`:'';})()} </div>`).join('')}<div style="flex:1"></div><div class="sidebar-footer"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div class="av">${ini(u?.nome||'A')}</div><div><div style="font-size:12px;font-weight:600;color:var(--text)">${u?.nome||'Admin'}</div><div style="font-size:10px;color:var(--text2)">${u?.cargo||''}</div></div></div><button class="theme-btn" onclick="toggleTheme()">${S.theme==='dark'?'☀️ Modo claro':'🌙 Modo escuro'}</button><button class="logout-btn" onclick="logout()">↗ Sair</button></div></div>`;
  const modal=S.modal==='pipeDeal'?mPipeDeal():S.modal==='pipeAtiv'?mPipeAtiv():S.modal==='deal'?mDeal():S.modal==='user'?mUser():S.modal==='hora'?mHora():S.modal==='recreal'?mRecReal():S.modal==='tarefa'?mTarefa():S.modal==='retparcela'?mRetParcela():S.modal==='meta'?mMeta():'';
  destroyCharts();app.innerHTML=`<div class="layout">${sidebar}<div class="main">${content}<div class="footer-bar">APEX PARTNERS — DOCUMENTO CONFIDENCIAL</div></div></div>${modal}`;
  if(!S.loading&&!S.detail)setTimeout(initCharts,150);
}
async function init(){const loginTime=parseInt(localStorage.getItem('apex_login_time')||'0');const agora=Date.now();if(S.loggedIn&&loginTime&&(agora-loginTime)>8*60*60*1000){logout();return;}if(S.loggedIn){await loadAll();}else{render();}setInterval(()=>{if(S.loggedIn)loadAll();},60000);if(S.loggedIn&&!loginTime)localStorage.setItem('apex_login_time',String(agora));}
init();
</script>
</body>
